name: One-time Codex persistence fix

on:
  push:
    branches:
      - master
    paths:
      - tools/fix_codex_persistence.py
      - .github/workflows/one-time-codex-persistence-fix.yml

permissions:
  contents: write

jobs:
  fix-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Codex persistence fix
        shell: bash
        run: |
          set +e
          sed -i 's/## Native configuration center/## Configuration center/' tools/fix_codex_persistence.py
          rm -f codex-fix.log
          python tools/fix_codex_persistence.py > codex-fix.log 2>&1
          status=$?
          cat codex-fix.log
          if [ $status -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add codex-fix.log
            git commit -m "chore: capture Codex fix failure"
            git push origin HEAD:master
            exit $status
          fi
          sed -i '/import net.minecraft.resources.ResourceLocation;/i import net.minecraft.network.chat.Component;' \
            src/main/java/com/bl4ues/scpinventory/client/gui/components/CodexPanel.java

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit final fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/fix_codex_persistence.py
          rm -f .github/workflows/one-time-codex-persistence-fix.yml
          rm -f codex-fix.log
          git add -A
          git commit -m "fix(codex): persist unique documents and world assets"
          git push origin HEAD:master
