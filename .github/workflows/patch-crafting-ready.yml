name: Apply Crafting Ingredient Cycle

on:
  pull_request:
    branches:
      - master
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/3.0.6-crafting-tab'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/3.0.6-crafting-tab
          fetch-depth: 0

      - name: Apply patch
        run: python .github/scripts/patch_crafting_cycle.py

      - name: Commit patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java/com/bl4ues/scpinventory/client/gui/components/CraftingPanel.java
          git commit -m "Cycle valid Crafting ingredients"
          git push origin HEAD:feature/3.0.6-crafting-tab
