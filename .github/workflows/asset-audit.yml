name: Asset Audit

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout Fabric source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Fabric port
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Audit repository and compiled JAR
        run: |
          python3 scripts/audit_unused_assets.py
          git rev-parse HEAD > build/reports/asset-audit/head-sha.txt
          git rev-parse 'HEAD^{tree}' > build/reports/asset-audit/tree-sha.txt
          git archive --format=zip --output=build/reports/asset-audit/source-snapshot.zip HEAD
          cp build/libs/*.jar build/reports/asset-audit/

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-audit-fabric-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/reports/asset-audit
          if-no-files-found: warn
