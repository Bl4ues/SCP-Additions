name: Patch Crafting UI

on:
  push:
    branches:
      - feature/3.0.6-crafting-tab
    paths:
      - .github/workflows/patch-crafting-ui.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/3.0.6-crafting-tab
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Refine Crafting panel
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/main/java/com/bl4ues/scpinventory/client/gui/components/CraftingPanel.java')
          text = path.read_text(encoding='utf-8')

          replacements = [
              ('private static final int RECIPE_ROW_HEIGHT = 50;',
               'private static final int RECIPE_ROW_HEIGHT = 46;'),
              ('private static final int RECIPE_ROW_GAP = 5;',
               'private static final int RECIPE_ROW_GAP = 4;'),
              ('private static final int INVENTORY_ROW_HEIGHT = 36;',
               'private static final int INVENTORY_ROW_HEIGHT = 32;'),
              ('private static final int PIN_WIDTH = 16;\n    private static final int PIN_HEIGHT = 16;',
               'private static final int PIN_WIDTH = 12;\n    private static final int PIN_HEIGHT = 14;\n    private static final int MAX_VISIBLE_INVENTORY_ROWS = 5;'),
              ('int iconY = rowY + 7;\n        drawSlot(graphics, iconX, iconY, RECIPE_ICON_SIZE);',
               'int iconY = rowY + 5;\n        drawSlot(graphics, iconX, iconY, RECIPE_ICON_SIZE);'),
              ('int pinY = rowY + 7;',
               'int pinY = rowY + 5;'),
              ('drawTrimmed(graphics, entry.name(), textX, rowY + 7,',
               'drawTrimmed(graphics, entry.name(), textX, rowY + 5,'),
              ('int materialY = rowY + 25;',
               'int materialY = rowY + 23;'),
              ('            int neededWidth = MATERIAL_ICON_SIZE + (group.count() > 1 ? 14 : 4);',
               '            boolean showCount = group.count() > 1 || !group.available();\n            int neededWidth = MATERIAL_ICON_SIZE + (showCount ? 16 : 4);'),
              ('            if (group.count() > 1) {\n                graphics.drawString(mc.font,\n                        ScpFonts.roboto("x" + group.count()),\n                        materialX + MATERIAL_ICON_SIZE - 1, materialY + 7,\n                        group.available() ? TEXT_WHITE : flash\n                                ? 0xFFFF8C8C : TEXT_DIM, false);\n            }',
               '            if (showCount) {\n                graphics.drawString(mc.font,\n                        ScpFonts.roboto("x" + group.count()),\n                        materialX + MATERIAL_ICON_SIZE - 1, materialY + 7,\n                        group.available() ? TEXT_WHITE : flash\n                                ? 0xFFFF8C8C : 0xFF8A8C8C, false);\n            }'),
              ('        graphics.drawString(mc.font, ScpFonts.roboto("ITEMS IN INVENTORY"),\n                getInventoryListX(), getInventoryHeaderY(), TEXT_WHITE, false);\n        if (inventory == null) return;',
               '        if (inventory == null) return;'),
              ('        return isInside(mouseX, mouseY, pinX, rowY + 7,\n                PIN_WIDTH, PIN_HEIGHT);',
               '        return isInside(mouseX, mouseY, pinX, rowY + 5,\n                PIN_WIDTH, PIN_HEIGHT);'),
              ('        graphics.fill(x + 4, y + 1, x + 12, y + 3, color);\n        graphics.fill(x + 6, y + 3, x + 10, y + 8, color);\n        graphics.fill(x + 3, y + 7, x + 13, y + 9, color);\n        graphics.fill(x + 7, y + 9, x + 9, y + 14, color);\n        graphics.fill(x + 8, y + 13, x + 9, y + 16, color);',
               '        graphics.fill(x + 3, y + 1, x + 9, y + 3, color);\n        graphics.fill(x + 5, y + 3, x + 7, y + 7, color);\n        graphics.fill(x + 2, y + 6, x + 10, y + 8, color);\n        graphics.fill(x + 5, y + 8, x + 7, y + 12, color);\n        graphics.fill(x + 6, y + 11, x + 7, y + 14, color);'),
              ('    private int getInventoryHeaderY() { return getGridStartY() + getGridPixels() + 24; }\n    private int getInventoryListX() { return gridX + 18; }\n    private int getInventoryListY() { return getInventoryHeaderY() + 17; }\n    private int getInventoryListWidth() { return Math.max(90, gridWidth - 45); }\n    private int getInventoryListHeight() { return Math.max(INVENTORY_ROW_HEIGHT, gridY + gridHeight - getInventoryListY() - 10); }\n    private int getVisibleInventoryRows() { return Math.max(1, getInventoryListHeight() / INVENTORY_ROW_HEIGHT); }',
               '    private int getInventoryListX() { return gridX + 18; }\n    private int getInventoryListY() { return getGridStartY() + getGridPixels() + 12; }\n    private int getInventoryListWidth() { return Math.max(90, gridWidth - 45); }\n    private int getInventoryListHeight() {\n        int available = Math.max(INVENTORY_ROW_HEIGHT,\n                gridY + gridHeight - getInventoryListY() - 10);\n        return Math.min(INVENTORY_ROW_HEIGHT * MAX_VISIBLE_INVENTORY_ROWS,\n                available);\n    }\n    private int getVisibleInventoryRows() {\n        return Math.max(1, Math.min(MAX_VISIBLE_INVENTORY_ROWS,\n                getInventoryListHeight() / INVENTORY_ROW_HEIGHT));\n    }')
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')

      - name: Build
        run: ./gradlew build

      - name: Commit refinement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java/com/bl4ues/scpinventory/client/gui/components/CraftingPanel.java
          git commit -m "Refine Crafting lists and material counts"
          git push origin HEAD:feature/3.0.6-crafting-tab
