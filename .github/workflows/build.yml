name: Bootstrap NeoForge 1.21.1 Port

on:
  push:
    branches:
      - port/neoforge-1.21.1
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'push' || github.head_ref == 'port/neoforge-1.21.1'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout port branch
        uses: actions/checkout@v4
        with:
          ref: port/neoforge-1.21.1
          fetch-depth: 0

      - name: Apply NeoForge 1.21.1 baseline migration
        run: python3 scripts/bootstrap_neoforge_1_21_1.py

      - name: Commit migrated project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/bootstrap_neoforge_1_21_1.py
          git add -A
          git commit -m "Port project baseline to NeoForge 1.21.1"
          git push origin HEAD:port/neoforge-1.21.1
