name: One-time UI and audio fix

on:
  push:
    branches:
      - integration/scp-additions-3.0
    paths:
      - .github/workflows/one-time-ui-audio-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/scp-additions-3.0
          fetch-depth: 0

      - name: Use Roboto only for Tesla permission text
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/main/java/net/mcreator/scpadditions/client/gui/TeslaTerminalScreen.java')
          text = path.read_text(encoding='utf-8')

          import_anchor = 'import net.mcreator.scpadditions.ScpAdditionsMod;\n'
          import_line = 'import net.mcreator.scpadditions.client.ScpFonts;\n'
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('TeslaTerminalScreen import anchor not found')
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          old = 'guiGraphics.drawString(this.font, Component.literal(text), 0, 0, color, false);'
          new = 'guiGraphics.drawString(this.font, Component.literal(text).withStyle(style -> style.withFont(ScpFonts.ROBOTO)), 0, 0, color, false);'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Tesla permission text draw call not found')

          path.write_text(text, encoding='utf-8')

      - name: Convert SCP-173 scrape sounds to positional mono
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in src/main/resources/assets/scpinventory/sounds/stone_scrap_*.ogg; do
            channels="$(ffprobe -v error -select_streams a:0 -show_entries stream=channels -of csv=p=0 "$file")"
            if [[ "$channels" != "1" ]]; then
              temp="${file%.ogg}.mono.ogg"
              ffmpeg -hide_banner -loglevel error -y -i "$file" -ac 1 -c:a libvorbis -q:a 6 "$temp"
              mv "$temp" "$file"
            fi
          done

      - name: Commit generated fixes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Nothing to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java/net/mcreator/scpadditions/client/gui/TeslaTerminalScreen.java
          git add src/main/resources/assets/scpinventory/sounds/stone_scrap_*.ogg
          git commit -m 'fix(audio): spatialize SCP-173 scrape sounds [skip ci]'
          git push origin HEAD:integration/scp-additions-3.0
