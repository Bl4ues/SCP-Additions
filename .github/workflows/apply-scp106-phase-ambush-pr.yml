name: Apply SCP-106 Phase Refinements

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/scp106-phase-ambush-command'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/scp106-phase-ambush-command

      - name: Extract implementation script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-scp106-phase-ambush.yml')
          text = workflow.read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY\n", start)

          output = []
          inside_triple = False
          for raw in text[start:end].splitlines():
              if inside_triple:
                  if "'''" in raw:
                      line = raw.lstrip()
                      inside_triple = False
                  else:
                      line = raw
              else:
                  line = raw[10:] if raw.startswith('          ') else raw
                  if line.count("'''") % 2 == 1:
                      inside_triple = True
              output.append(line)

          Path('/tmp/apply_scp106_phase.py').write_text(
                  '\n'.join(output) + '\n', encoding='utf-8')
          PY

      - name: Apply implementation
        shell: bash
        run: |
          set -o pipefail
          python /tmp/apply_scp106_phase.py 2>&1 | tee /tmp/apply.log

      - name: Build implementation
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew clean build --stacktrace 2>&1 | tee /tmp/build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scp106-phase-runner-diagnostics
          path: |
            /tmp/apply_scp106_phase.py
            /tmp/apply.log
            /tmp/build.log
          if-no-files-found: warn

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-scp106-phase-ambush.yml
          rm -f .github/scp106-phase-trigger
          git add CHANGELOG.md \
            src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java \
            src/main/java/net/mcreator/scpadditions/roamer/Scp106PhasePortalTracker.java \
            src/main/java/net/mcreator/scpadditions/roamer/Scp106EmergenceLocator.java \
            src/main/java/net/mcreator/scpadditions/roamer/RoamerCommands.java \
            src/main/java/net/mcreator/scpadditions/event/Scp106SpawnEvents.java \
            src/main/java/net/mcreator/scpadditions/event/Scp173SpawnEvents.java \
            src/main/java/net/mcreator/scpadditions/client/Scp106PortalParticle.java \
            src/main/java/net/mcreator/scpadditions/client/Scp106CorrosionParticle.java \
            src/main/resources/assets/scp_additions/textures/particle/scp_106_puddle.png \
            .github/workflows/apply-scp106-phase-ambush.yml \
            .github/scp106-phase-trigger
          git commit -m "Refine SCP-106 ambush phasing and roamer force spawning"
          git push origin HEAD:feature/scp106-phase-ambush-command
