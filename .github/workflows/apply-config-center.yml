name: Apply Config Center

on:
  push:
    paths:
      - '.github/workflows/apply-config-center.yml'

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Expand reviewed configuration-center sources
        shell: bash
        run: cat .github/config-center-payload/part*.b64 | base64 --decode | tar -xz

      - name: Check patch formatting
        run: git diff --check

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Commit compiled implementation
        shell: bash
        run: |
          rm -rf .github/config-center-payload .github/workflows/apply-config-center.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(config): add native in-game configuration center"
          git push origin HEAD:master
