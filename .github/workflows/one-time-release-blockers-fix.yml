name: One-time 3.0.3 release blocker fix

on:
  push:
    branches:
      - master
    paths:
      - tools/release_blockers_trigger.txt

permissions:
  contents: write

jobs:
  apply-build-server-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply patch
        shell: bash
        run: |
          set +e
          python tools/apply_release_blockers_fix.py > /tmp/release-fix.log 2>&1
          status=$?
          cat /tmp/release-fix.log
          if [ $status -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/release-fix.log release-fix.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add release-fix.log
            git commit -m "chore: capture release fix failure"
            git push origin HEAD:master
            exit $status
          fi

      - name: Static common-side audit
        shell: bash
        run: |
          set -e
          if grep -R "net.minecraft.client.resources.sounds" src/main/java/net/mcreator/scpadditions/network; then
            echo "Client-only sound import remains in common network package."
            exit 1
          fi
          if grep -R "ScpAdditionsModGameRules.TESLAGATEON).set(true" \
            src/main/java/net/mcreator/scpadditions/procedures/Scp079controloffUpdateTickProcedure.java; then
            echo "Legacy SCP-079 Tesla override remains."
            exit 1
          fi

      - name: Clean build
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace 2>&1 | tee /tmp/release-build.log

      - name: Dedicated server smoke test
        shell: bash
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          set +e
          timeout 180s ./gradlew runServer --stacktrace > /tmp/dedicated-server.log 2>&1
          status=$?
          set -e
          tail -n 160 /tmp/dedicated-server.log
          if grep -q "Attempted to load class .* for invalid dist DEDICATED_SERVER" /tmp/dedicated-server.log; then
            echo "Dedicated-server dist crash detected."
            exit 1
          fi
          if grep -q "has failed to load correctly" /tmp/dedicated-server.log; then
            echo "A mod failed during dedicated-server startup."
            exit 1
          fi
          if grep -q "Done (" /tmp/dedicated-server.log || grep -q "For help, type" /tmp/dedicated-server.log; then
            echo "Dedicated server reached the running state."
            exit 0
          fi
          echo "Dedicated server did not reach the running state; exit code: $status"
          exit 1

      - name: Commit final patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/apply_release_blockers_fix.py
          rm -f tools/release_blockers_trigger.txt
          rm -f .github/workflows/one-time-release-blockers-fix.yml
          rm -f release-fix.log
          git add -A
          git commit -m "fix: resolve 3.0.3 release blockers"
          git push origin HEAD:master
