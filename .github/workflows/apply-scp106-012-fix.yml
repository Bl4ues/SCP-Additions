name: Apply SCP-106 and SCP-012 Fixes

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.head_ref, 'automation/scp106-012-fix')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Apply prepared patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/build.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          code = workflow[start:end]
          code = '\n'.join(line[10:] if line.startswith('          ') else line
                           for line in code.splitlines())
          Path('/tmp/apply_fix.py').write_text(code + '\n', encoding='utf-8')
          PY

          if ! python /tmp/apply_fix.py > /tmp/patch-output.txt 2>&1; then
            cp /tmp/patch-output.txt .github/scp106-012-patch-error.txt
            git add .github/scp106-012-patch-error.txt
            git commit -m "Record SCP-106 and SCP-012 patch failure"
            git push origin HEAD:master
            exit 1
          fi

          rm -f .github/workflows/apply-scp106-012-fix.yml
          rm -f .github/scp106-012-fix-trigger
          rm -f .github/scp106-012-patch-error.txt
          git add .github/workflows/build.yml .github/workflows/apply-scp106-012-fix.yml .github/scp106-012-fix-trigger .github/scp106-012-patch-error.txt CHANGELOG.md \
            src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java \
            src/main/java/net/mcreator/scpadditions/client/Scp106CorrosionParticle.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012Pathfinder.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012InfluenceEvents.java \
            src/main/resources/assets/scp_additions/particles/scp_106_corrosion.json \
            src/main/resources/assets/scp_additions/textures/particle/scp_106_puddle.png
          git commit -m "Fix SCP-106 pursuit persistence and SCP-012 path gating"
          git push origin HEAD:master
