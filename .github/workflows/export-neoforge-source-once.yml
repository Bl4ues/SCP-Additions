name: Materialize validated NeoForge port source

on:
  push:
    branches:
      - neoforge-1.21.1-port-3.0.7
    paths:
      - .github/workflows/export-neoforge-source-once.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neoforge-source-materialization
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout NeoForge branch
        uses: actions/checkout@v4
        with:
          ref: neoforge-1.21.1-port-3.0.7
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply all validated NeoForge migrations
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            apply_tick_bridge.py
            apply_network_bridge.py
            apply_inventory_attachment.py
            apply_player_variables_attachment.py
            apply_saved_data_api.py
            apply_inventory_stack_serialization.py
            apply_misc_api_moves.py
            apply_item_custom_data.py
            apply_item_api_renames.py
            apply_core_api_moves.py
            apply_capability_and_ui_api.py
            apply_gameplay_api_round2.py
            apply_gameplay_api_round3.py
            apply_gameplay_api_round4.py
            apply_gameplay_api_round5.py
            apply_gameplay_api_round6.py
          )
          : > neoforge-materialization.log
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee -a neoforge-materialization.log
            python3 "tools/neoforge_port/$script" 2>&1 | tee -a neoforge-materialization.log
          done

      - name: Verify materialized source builds
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon --stacktrace

      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src build.gradle gradle.properties settings.gradle
          if git diff --cached --quiet; then
            echo 'NeoForge source is already fully materialized.'
            exit 0
          fi
          git commit -m 'fix(neoforge): materialize validated Minecraft 1.21.1 API migrations'
          git push origin HEAD:neoforge-1.21.1-port-3.0.7

      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-materialization-${{ github.sha }}
          path: neoforge-materialization.log
          if-no-files-found: warn
