name: Export changelog source

on:
  push:
    branches:
      - validation/scp-012-complete

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: changelog-source
          path: CHANGELOG.md
          if-no-files-found: error
