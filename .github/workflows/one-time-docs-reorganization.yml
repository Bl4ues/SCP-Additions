name: One-time documentation reorganization

on:
  push:
    branches:
      - master
    paths:
      - tools/docs_reorganization_trigger.txt

permissions:
  contents: write

jobs:
  apply-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reorganize documentation
        run: python tools/reorganize_readme_and_wiki.py

      - name: Validate documentation tree
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f docs/wiki/Home.md
          test -f docs/wiki/_Sidebar.md
          test "$(find docs/wiki -maxdepth 1 -name '*.md' | wc -l)" -ge 12
          grep -q "five numbered skins" docs/wiki/SCP-914.md
          grep -q "PNG, JPG, and JPEG" docs/wiki/Gameplay-Systems.md
          grep -q "CODEX.*internal" docs/wiki/Configuration-Files.md

      - name: Commit final documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/reorganize_readme_and_wiki.py
          rm -f tools/docs_reorganization_trigger.txt
          rm -f .github/workflows/one-time-docs-reorganization.yml
          git add -A
          git commit -m "docs: move usage reference from README into wiki pages"
          git push origin HEAD:master
