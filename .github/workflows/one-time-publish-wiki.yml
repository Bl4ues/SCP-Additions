name: One-time publish Wiki

on:
  push:
    branches:
      - master
    paths:
      - tools/publish_wiki_trigger.txt

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Bl4ues/SCP-Additions.wiki.git" wiki

      - name: Publish organized pages
        run: |
          find wiki -maxdepth 1 -type f -name '*.md' -delete
          cp docs/wiki/*.md wiki/
          cd wiki
          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already matches docs/wiki."
          else
            git commit -m "docs: publish organized SCP Additions wiki"
            git push origin HEAD:master
          fi

      - name: Remove temporary publisher from main repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f .github/workflows/one-time-publish-wiki.yml
          rm -f tools/publish_wiki_trigger.txt
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: remove temporary Wiki publisher"
          git push "https://x-access-token:${GH_TOKEN}@github.com/Bl4ues/SCP-Additions.git" HEAD:master
