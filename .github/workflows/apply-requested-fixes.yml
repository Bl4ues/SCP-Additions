name: Apply requested integration fixes

on:
  pull_request:
    branches:
      - integration/scp-additions-3.0
    types:
      - opened

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout temporary fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply patches and build
        id: patch
        shell: bash
        run: |
          set +e
          {
            set -e
            python3 scripts/requested_fix/write_defaults.py
            python3 scripts/requested_fix/patch_facility_keys.py
            python3 scripts/requested_fix/patch_screwdriver_fonts.py
            python3 scripts/requested_fix/patch_defaults.py
            python3 - <<'PY'
          import json
          from pathlib import Path
          files = [
              Path('config/scpinventory/context_interactions.json'),
              Path('config/scpinventory/scpinventory.json'),
              Path('config/scpadditions/294drinks.json'),
              Path('config/scpadditions/914recipes.json'),
              Path('config/scpadditions/modules.json'),
          ]
          for path in files:
              json.loads(path.read_text(encoding='utf-8'))
              print(f'Valid JSON: {path}')
          PY
            chmod +x gradlew
            ./gradlew clean build --stacktrace
          } > /tmp/requested-fix.log 2>&1
          status=$?
          cat /tmp/requested-fix.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit verified fixes
        if: steps.patch.outputs.status == '0'
        run: |
          rm -rf scripts/requested_fix
          rm -f scripts/inspect_requested_fix_targets.py
          rm -f .github/workflows/inspect-requested-fix-targets.yml
          rm -f migration-reference/requested-fix-targets.txt
          rm -f migration-reference/requested-fix-run.log
          rm -f migration-reference/requested-fix-pr-trigger.txt
          rm -f .github/workflows/apply-requested-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix integrated panels, UI, keycards and defaults"
          git push origin HEAD:${{ github.head_ref }}

      - name: Record failure diagnostics
        if: steps.patch.outputs.status != '0'
        run: |
          git reset --hard HEAD
          cp /tmp/requested-fix.log migration-reference/requested-fix-run.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration-reference/requested-fix-run.log
          git commit -m "Record requested fix workflow failure"
          git push origin HEAD:${{ github.head_ref }}
          exit 1
