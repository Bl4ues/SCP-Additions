name: Asset Audit

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply NeoForge port migrations
        shell: bash
        run: |
          set -euo pipefail
          scripts=(
            apply_tick_bridge.py
            apply_network_bridge.py
            apply_inventory_attachment.py
            apply_player_variables_attachment.py
            apply_saved_data_api.py
            apply_inventory_stack_serialization.py
            apply_misc_api_moves.py
            apply_item_custom_data.py
            apply_item_api_renames.py
            apply_core_api_moves.py
            apply_capability_and_ui_api.py
            apply_gameplay_api_round2.py
            apply_gameplay_api_round3.py
            apply_gameplay_api_round4.py
            apply_gameplay_api_round5.py
            apply_gameplay_api_round6.py
          )
          for script in "${scripts[@]}"; do
            python3 "tools/neoforge_port/$script"
          done

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Validate Forge 3.0.7 feature parity
        run: |
          git fetch origin master:refs/remotes/origin/master
          python3 scripts/validate_port_feature_parity.py \
            --base-ref origin/master \
            --report build/reports/port-parity/report.json

      - name: Audit repository and compiled JAR
        run: |
          python3 scripts/audit_unused_assets.py
          git rev-parse HEAD > build/reports/asset-audit/head-sha.txt
          git rev-parse 'HEAD^{tree}' > build/reports/asset-audit/tree-sha.txt
          git diff --binary > build/reports/asset-audit/transformed-source.patch
          git archive --format=zip --output=build/reports/asset-audit/source-snapshot.zip HEAD
          cp build/libs/*.jar build/reports/asset-audit/

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-audit-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            build/reports/asset-audit
            build/reports/port-parity
          if-no-files-found: warn
