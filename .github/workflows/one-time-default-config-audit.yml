name: One-time default config cleanup

on:
  push:
    branches:
      - master
    paths:
      - tools/clean_default_configs.py

permissions:
  contents: write

jobs:
  clean-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Clean bundled defaults
        run: python tools/clean_default_configs.py

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/clean_default_configs.py
          rm -f tools/audit_default_configs.py
          rm -f tools/default_config_cleanup_report.json
          rm -f .github/workflows/one-time-default-config-audit.yml
          git add -A
          git commit -m "chore(config): remove stale legacy default entries"
          git push origin HEAD:master
