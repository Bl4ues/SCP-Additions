name: Apply SCP-106 Audio and Hunt Polish

on:
  push:
    branches:
      - feature/scp106-audio-and-hunt-polish

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scp106-audio-and-hunt-polish
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Apply implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:100]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Correct the accidentally uploaded filename without changing the audio.
          old_audio = Path('src/main/resources/assets/scp_additions/sounds/10phase_2.ogg')
          new_audio = Path('src/main/resources/assets/scp_additions/sounds/106phase_2.ogg')
          if old_audio.exists() and not new_audio.exists():
              new_audio.write_bytes(old_audio.read_bytes())
              old_audio.unlink()

          # Sound registry.
          path = Path('src/main/java/net/mcreator/scpadditions/init/ScpAdditionsModSounds.java')
          text = path.read_text(encoding='utf-8')
          marker = '\tpublic static final RegistryObject<SoundEvent> SCP012_ON_MOUNT_GOLGOTHA = REGISTRY.register("scp012_on_mount_golgotha", () -> SoundEvent.createVariableRangeEvent(new ResourceLocation("scp_additions", "scp012_on_mount_golgotha")));\n'
          additions = marker + '\tpublic static final RegistryObject<SoundEvent> SCP_106_PHASE = REGISTRY.register("scp106_phase", () -> SoundEvent.createVariableRangeEvent(new ResourceLocation("scp_additions", "scp106_phase")));\n\tpublic static final RegistryObject<SoundEvent> SCP_106_CHASE = REGISTRY.register("scp106_chase", () -> SoundEvent.createVariableRangeEvent(new ResourceLocation("scp_additions", "scp106_chase")));\n\tpublic static final RegistryObject<SoundEvent> SCP_106_STOP = REGISTRY.register("scp106_stop", () -> SoundEvent.createVariableRangeEvent(new ResourceLocation("scp_additions", "scp106_stop")));\n\tpublic static final RegistryObject<SoundEvent> ENTER = REGISTRY.register("enter", () -> SoundEvent.createVariableRangeEvent(new ResourceLocation("scp_additions", "enter")));\n'
          if 'SCP_106_PHASE' not in text:
              if marker not in text:
                  raise SystemExit('Could not find sound registry insertion marker')
              path.write_text(text.replace(marker, additions, 1), encoding='utf-8')

          # sounds.json is minified, so update it structurally.
          path = Path('src/main/resources/assets/scp_additions/sounds.json')
          sounds = json.loads(path.read_text(encoding='utf-8'))
          sounds['scp106_phase'] = {
              'subtitle': 'subtitles.scp_additions.scp106_phase',
              'sounds': [
                  {'name': 'scp_additions:106phase_1', 'stream': False, 'volume': 1.0},
                  {'name': 'scp_additions:106phase_2', 'stream': False, 'volume': 1.0},
                  {'name': 'scp_additions:106phase_3', 'stream': False, 'volume': 1.0},
              ],
          }
          sounds['scp106_chase'] = {
              'sounds': [{'name': 'scp_additions:106chase', 'stream': True, 'volume': 1.0}],
          }
          sounds['scp106_stop'] = {
              'sounds': [{'name': 'scp_additions:106stop', 'stream': True, 'volume': 1.0}],
          }
          sounds['enter'] = {
              'sounds': [{'name': 'scp_additions:enter', 'stream': True, 'volume': 1.0}],
