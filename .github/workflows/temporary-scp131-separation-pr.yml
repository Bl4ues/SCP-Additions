name: Temporary SCP-131 Separation PR Patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/scp079-scp131-separation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scp079-scp131-separation
          fetch-depth: 0
      - name: Apply implementation
        run: python tools/temporary_scp131_separation_patch.py
      - name: Commit implementation
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md src/main/java
          git commit -m "Add SCP-079 SCP-131 separation strategy"
          git push origin HEAD:feature/scp079-scp131-separation
