name: Materialize Fabric parity fix

on:
  push:
    branches:
      - fix/fabric-1.21.1-parity-3.0.7
    paths:
      - '.github/workflows/materialize-ui-parity-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  TARGET_BRANCH: fix/fabric-1.21.1-parity-3.0.7

jobs:
  restore-build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Fetch parity references
        run: |
          git fetch origin master:refs/remotes/origin/master
          git fetch origin neoforge-1.21.1-port-3.0.7:refs/remotes/origin/neoforge-1.21.1-port-3.0.7

      - name: Restore presentation and feature parity
        run: python3 tools/port_1_21/restore_master_parity.py --loader fabric

      - name: Build Fabric source
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon --stacktrace

      - name: Validate complete feature and data surface
        run: python3 scripts/validate_port_feature_parity.py --base-ref origin/master

      - name: Commit validated parity restoration
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build.gradle config scripts src tools
          if git diff --cached --quiet; then
            echo 'Fabric parity restoration is already materialized.'
          else
            git commit -m 'Restore Fabric 1.21.1 feature and UI parity [skip ci]'
            git push origin HEAD:${{ env.TARGET_BRANCH }}
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fabric-parity-materialization
          path: |
            build/libs/*.jar
            build/reports/port-parity/report.json
          if-no-files-found: warn
