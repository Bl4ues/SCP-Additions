name: Sync Master Hotfix to NeoForge 1.21.1

on:
  push:
    branches:
      - neoforge-1.21.1-port-3.0.7
    paths:
      - '.github/workflows/sync-master-hotfix-neoforge.yml'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/sync-master-hotfix-neoforge.yml'
      - 'config/**'
      - 'src/main/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout NeoForge revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Fetch validated Forge baseline
        run: git fetch --no-tags origin master:refs/remotes/origin/master

      - name: Apply master hotfix as a three-way patch
        shell: bash
        run: |
          set -euo pipefail
          git diff --binary \
            26308ad9dbbdca536a7095c102902576789c0a6f \
            origin/master -- \
            config/scpinventory/context_interactions.json \
            src/main/java/com/bl4ues/scpinventory \
            src/main/java/net/mcreator/scpadditions/config/ScpAdditionsReloadCommand.java \
            src/main/java/net/mcreator/scpadditions/data/Scp294DrinkManager.java \
            src/main/java/net/mcreator/scpadditions/entity/Scp173Entity.java \
            src/main/java/net/mcreator/scpadditions/procedures/TeslaGatePulseHelper.java \
            src/main/java/net/mcreator/scpadditions/procedures/TeslaGateUpdateTickProcedure.java \
            src/main/java/net/mcreator/scpadditions/procedures/TeslaGateVolume.java \
            src/main/resources/assets/scp_additions/lang/en_us.json \
            > master-multiplayer-hotfix.patch
          set +e
          git apply --3way --whitespace=nowarn master-multiplayer-hotfix.patch \
            > neoforge-hotfix-apply.log 2>&1
          status=$?
          git status --short | tee -a neoforge-hotfix-apply.log
          if test "$status" != "0"; then
            cp neoforge-hotfix-apply.log /tmp/neoforge-hotfix-apply.log
            git diff --name-only --diff-filter=U > /tmp/neoforge-hotfix-conflicts.txt
            git reset --hard HEAD
            mkdir -p .port-sync
            cp /tmp/neoforge-hotfix-apply.log .port-sync/neoforge-hotfix-apply.log
            cp /tmp/neoforge-hotfix-conflicts.txt .port-sync/neoforge-hotfix-conflicts.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .port-sync
            git commit -m 'Record NeoForge hotfix synchronization conflict [skip ci]'
            git push origin HEAD:neoforge-1.21.1-port-3.0.7
            cat .port-sync/neoforge-hotfix-apply.log
            exit "$status"
          fi
          set -e

      - name: Reapply NeoForge 1.21.1 migrations
        shell: bash
        run: |
          set -euo pipefail
          : > neoforge-hotfix-migration.log
          scripts=(
            apply_tick_bridge.py
            apply_network_bridge.py
            apply_inventory_attachment.py
            apply_player_variables_attachment.py
            apply_saved_data_api.py
            apply_inventory_stack_serialization.py
            apply_misc_api_moves.py
            apply_item_custom_data.py
            apply_item_api_renames.py
            apply_core_api_moves.py
            apply_capability_and_ui_api.py
            apply_gameplay_api_round2.py
            apply_gameplay_api_round3.py
            apply_gameplay_api_round4.py
            apply_gameplay_api_round5.py
            apply_gameplay_api_round6.py
          )
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee -a neoforge-hotfix-migration.log
            python3 "tools/neoforge_port/$script" 2>&1 | tee -a neoforge-hotfix-migration.log
          done
          git diff --check

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build NeoForge hotfix
        shell: bash
        run: |
          set -o pipefail
          ./gradlew clean build --no-daemon --stacktrace 2>&1 | tee neoforge-hotfix-build.log

      - name: Launch dedicated server smoke test
        shell: bash
        run: |
          set +e
          mkdir -p run/server
          printf 'eula=true\n' > run/server/eula.txt
          cat > run/server/server.properties <<'EOF'
          online-mode=false
          server-port=25581
          motd=SCP Additions NeoForge multiplayer hotfix smoke test
          view-distance=4
          simulation-distance=4
          spawn-protection=0
          max-tick-time=120000
          EOF
          setsid ./gradlew runServer --no-daemon --console=plain > neoforge-hotfix-server.log 2>&1 &
          pid=$!
          started=0
          for second in $(seq 1 300); do
            if test -f run/server/logs/latest.log && grep -Fq 'Done (' run/server/logs/latest.log; then
              started=1
              break
            fi
            kill -0 "$pid" 2>/dev/null || break
            sleep 1
          done
          kill -INT -- "-$pid" 2>/dev/null || true
          sleep 5
          kill -KILL -- "-$pid" 2>/dev/null || true
          wait "$pid" 2>/dev/null || true
          test "$started" = "1" || { tail -n 500 neoforge-hotfix-server.log; exit 1; }
          ! grep -Eqi 'Exception in server tick loop|Failed to start the minecraft server|Mod loading has failed|Loading errors encountered' \
            neoforge-hotfix-server.log run/server/logs/latest.log 2>/dev/null

      - name: Launch graphical client smoke test
        shell: bash
        run: |
          set +e
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi
          timeout --signal=INT --kill-after=20s 180s \
            xvfb-run -a -s '-screen 0 1280x720x24' \
            ./gradlew runClient --no-daemon --console=plain \
            > neoforge-hotfix-client.log 2>&1
          status=$?
          if test "$status" != "124" && test "$status" != "130"; then
            tail -n 500 neoforge-hotfix-client.log
            exit 1
          fi
          grep -Eqi 'Sound engine started|OpenAL initialized|Created: [0-9]+x[0-9]+x[0-9]+ minecraft:textures/atlas' \
            neoforge-hotfix-client.log run/client/logs/latest.log 2>/dev/null || exit 1
          ! grep -Eqi 'Mod loading has failed|Loading errors encountered|Exception in thread "Render thread"|The game crashed whilst|Description: Initializing game' \
            neoforge-hotfix-client.log run/client/logs/latest.log 2>/dev/null

      - name: Commit validated NeoForge hotfix
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add config src/main
          if git diff --cached --quiet; then
            echo 'NeoForge multiplayer hotfix is already materialized.'
          else
            git commit -m 'Port multiplayer hotfix to NeoForge 1.21.1 [skip ci]'
            git push origin HEAD:neoforge-1.21.1-port-3.0.7
          fi

      - name: Upload hotfix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-master-hotfix-${{ github.sha }}
          path: |
            master-multiplayer-hotfix.patch
            neoforge-hotfix-apply.log
            neoforge-hotfix-migration.log
            neoforge-hotfix-build.log
            neoforge-hotfix-server.log
            neoforge-hotfix-client.log
            run/server/logs/latest.log
            run/client/logs/latest.log
            build/libs/*.jar
            run/server/crash-reports/**
            run/client/crash-reports/**
          if-no-files-found: warn
