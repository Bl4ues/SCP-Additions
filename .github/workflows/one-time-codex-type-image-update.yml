name: One-time Codex type and image update

on:
  push:
    branches:
      - master
    paths:
      - tools/codex_type_image_trigger.txt

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply update
        run: python tools/apply_codex_type_image_update.py

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit final update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/apply_codex_type_image_update.py
          rm -f tools/codex_type_image_trigger.txt
          rm -f .github/workflows/one-time-codex-type-image-update.yml
          git add -A
          git commit -m "fix(codex): restrict document typing and expand image support"
          git push origin HEAD:master
