name: Apply SCP-106 Ranged Combat

on:
  push:
    branches:
      - feature/scp106-ranged-combat

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
