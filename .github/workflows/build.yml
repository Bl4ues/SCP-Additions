name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
      - 'feature/**'
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Apply SCP-106 and SCP-012 fixes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.event.head_commit.message == 'Prepare SCP-106 pursuit and SCP-012 path fixes'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout -B master origin/master

          python - <<'PY'
          import math
          import random
          import re
          import struct
          import zlib
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise RuntimeError(f"Could not locate {label}")
              return text.replace(old, new, 1)

          entity_path = Path('src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java')
          entity = entity_path.read_text(encoding='utf-8')
          entity = replace_once(entity,
              'import net.minecraft.util.Mth;\n',
              'import net.minecraft.util.Mth;\nimport net.minecraft.world.Difficulty;\n',
              'Difficulty import')
          entity = replace_once(entity,
              '    private static final double AMBUSH_DISTANCE = 22.0D;\n',
              '    private static final double AMBUSH_DISTANCE = 16.0D;\n',
              'ambush distance')
          entity = replace_once(entity,
              '    private static final int AMBUSH_DISTANCE_TICKS = 40;\n'
              '    private static final int AMBUSH_COOLDOWN_TICKS = 12 * 20;\n'
              '    private static final int TARGET_LOST_DESPAWN_TICKS = 40;\n',
              '    private static final int AMBUSH_DISTANCE_TICKS = 20;\n'
              '    private static final int AMBUSH_COOLDOWN_TICKS = 8 * 20;\n'
              '    private static final int TARGET_LOST_DESPAWN_TICKS = 10 * 20;\n',
              'ambush timing')
          entity = replace_once(entity,
              '        ambushCooldownTicks = AMBUSH_COOLDOWN_TICKS;\n'
              '        startEmergence(emergence);\n',
              '        ambushCooldownTicks = 0;\n'
              '        startEmergence(emergence);\n',
              'initial ambush cooldown')
          entity = replace_once(entity,
              '        if (ambushCooldownTicks > 0) ambushCooldownTicks--;\n\n'
              '        switch (getEncounterState()) {\n',
              '        if (level().getDifficulty() == Difficulty.PEACEFUL) {\n'
              '            discard();\n'
              '            return;\n'
              '        }\n\n'
              '        if (ambushCooldownTicks > 0) ambushCooldownTicks--;\n\n'
              '        switch (getEncounterState()) {\n',
              'Peaceful despawn')
          entity = replace_once(entity,
              '        boolean playerEscaping = player.getDeltaMovement()\n'
              '                .horizontalDistanceSqr() > 0.004D;\n'
              '        if (distanceToSqr(player) >= AMBUSH_DISTANCE_SQR\n'
              '                && playerEscaping) {\n',
              '        if (distanceToSqr(player) >= AMBUSH_DISTANCE_SQR) {\n',
              'ambush pressure condition')
          entity_path.write_text(entity, encoding='utf-8')

          particle_path = Path('src/main/java/net/mcreator/scpadditions/client/Scp106CorrosionParticle.java')
          particle = particle_path.read_text(encoding='utf-8')
          render_pattern = re.compile(
              r'    @Override\n    public void render\(VertexConsumer vertexConsumer, Camera camera,\n'
              r'            float partialTick\) \{.*?\n    @Override\n'
              r'    public ParticleRenderType getRenderType\(\)', re.DOTALL)
          render_replacement = '''    @Override
              public void render(VertexConsumer vertexConsumer, Camera camera,
                      float partialTick) {
                  Vec3 cameraPosition = camera.getPosition();
                  float renderX = (float) (Mth.lerp(partialTick, this.xo, this.x)
                          - cameraPosition.x());
                  float renderY = (float) (Mth.lerp(partialTick, this.yo, this.y)
                          - cameraPosition.y());
                  float renderZ = (float) (Mth.lerp(partialTick, this.zo, this.z)
                          - cameraPosition.z());
                  float size = getQuadSize(partialTick);
                  int light = getLightColor(partialTick);

                  renderLobe(vertexConsumer, renderX, renderY, renderZ,
                          size * 1.22F, size * 0.82F, puddleRotation,
                          light, 1.0F);
                  renderLobe(vertexConsumer,
                          renderX + Mth.cos(firstLobeAngle) * size * firstLobeDistance,
                          renderY + 0.0004F,
                          renderZ + Mth.sin(firstLobeAngle) * size * firstLobeDistance,
                          size * 0.76F, size * 0.57F,
                          puddleRotation + 0.68F, light, 0.92F);
                  renderLobe(vertexConsumer,
                          renderX + Mth.cos(secondLobeAngle) * size * secondLobeDistance,
                          renderY + 0.0008F,
                          renderZ + Mth.sin(secondLobeAngle) * size * secondLobeDistance,
                          size * 0.63F, size * 0.50F,
                          puddleRotation - 0.54F, light, 0.86F);
              }

              private void renderLobe(VertexConsumer vertexConsumer,
                      float centerX, float centerY, float centerZ,
                      float radiusX, float radiusZ, float rotation,
                      int light, float alphaMultiplier) {
                  float cos = Mth.cos(rotation);
                  float sin = Mth.sin(rotation);
                  float x0 = centerX + (-radiusX * cos + radiusZ * sin);
                  float z0 = centerZ + (-radiusX * sin - radiusZ * cos);
                  float x1 = centerX + (-radiusX * cos - radiusZ * sin);
                  float z1 = centerZ + (-radiusX * sin + radiusZ * cos);
                  float x2 = centerX + (radiusX * cos - radiusZ * sin);
                  float z2 = centerZ + (radiusX * sin + radiusZ * cos);
                  float x3 = centerX + (radiusX * cos + radiusZ * sin);
                  float z3 = centerZ + (radiusX * sin - radiusZ * cos);
                  float renderedAlpha = alpha * alphaMultiplier;

                  vertexConsumer.vertex(x0, centerY, z0).uv(getU1(), getV1())
                          .color(rCol, gCol, bCol, renderedAlpha).uv2(light).endVertex();
                  vertexConsumer.vertex(x1, centerY, z1).uv(getU1(), getV0())
                          .color(rCol, gCol, bCol, renderedAlpha).uv2(light).endVertex();
                  vertexConsumer.vertex(x2, centerY, z2).uv(getU0(), getV0())
                          .color(rCol, gCol, bCol, renderedAlpha).uv2(light).endVertex();
                  vertexConsumer.vertex(x3, centerY, z3).uv(getU0(), getV1())
                          .color(rCol, gCol, bCol, renderedAlpha).uv2(light).endVertex();
              }

              @Override
              public ParticleRenderType getRenderType()'''.replace('              ', '')
          particle, count = render_pattern.subn(render_replacement, particle, count=1)
          if count != 1:
              raise RuntimeError('Could not replace corrosion particle renderer')
          particle_path.write_text(particle, encoding='utf-8')

          texture_dir = Path('src/main/resources/assets/scp_additions/textures/particle')
          texture_dir.mkdir(parents=True, exist_ok=True)
          width = height = 64
          random.seed(106)
          harmonics = [(random.uniform(0, math.tau), random.uniform(0.025, 0.075), n)
                       for n in (2, 3, 5, 7, 9)]
          rows = []
          for y in range(height):
              row = bytearray([0])
              for x in range(width):
                  dx = (x + 0.5 - width / 2) / (width / 2)
                  dy = (y + 0.5 - height / 2) / (height / 2)
                  angle = math.atan2(dy, dx)
                  radius = math.hypot(dx, dy)
                  boundary = 0.79
                  for phase, amplitude, frequency in harmonics:
                      boundary += math.sin(angle * frequency + phase) * amplitude
                  softness = 0.12
                  alpha = max(0.0, min(1.0, (boundary - radius) / softness))
                  alpha = alpha * alpha * (3.0 - 2.0 * alpha)
                  edge_noise = 0.92 + 0.08 * math.sin(x * 0.73 + y * 0.41)
                  a = int(255 * alpha * edge_noise)
                  row.extend((24, 8, 4, a))
              rows.append(bytes(row))
          raw = b''.join(rows)
          def chunk(kind, data):
              return struct.pack('>I', len(data)) + kind + data + struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff)
          png = (b'\x89PNG\r\n\x1a\n'
                 + chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 6, 0, 0, 0))
                 + chunk(b'IDAT', zlib.compress(raw, 9))
                 + chunk(b'IEND', b''))
          (texture_dir / 'scp_106_puddle.png').write_bytes(png)

          Path('src/main/resources/assets/scp_additions/particles/scp_106_corrosion.json').write_text(
              '{\n  "textures": [\n    "scp_additions:scp_106_puddle"\n  ]\n}\n', encoding='utf-8')

          pathfinder_path = Path('src/main/java/net/mcreator/scpadditions/scp012/Scp012Pathfinder.java')
          pathfinder = pathfinder_path.read_text(encoding='utf-8')
          pathfinder = replace_once(pathfinder,
              '    private static final Map<UUID, CachedPath> CACHE = new HashMap<>();\n',
              '    private static final Map<UUID, CachedPath> CACHE = new HashMap<>();\n'
              '    private static final Map<UUID, CachedReachability> REACHABILITY = new HashMap<>();\n',
              'SCP-012 reachability cache')
          marker = '    public static Vec3 nextWaypoint(ServerLevel level, ServerPlayer player,\n'
          reachability_method = '''    public static boolean hasOpenPath(ServerLevel level,
                      ServerPlayer player, Vec3 goal) {
                  if (directlyReachable(level, player, goal)) return true;

                  UUID id = player.getUUID();
                  BlockPos goalPos = BlockPos.containing(goal.x, goal.y, goal.z);
                  long time = level.getGameTime();
                  CachedReachability cached = REACHABILITY.get(id);
                  if (cached != null && cached.expiresAt >= time
                          && cached.goal.equals(goalPos)) {
                      return cached.reachable;
                  }

                  List<BlockPos> path = find(level, player, goalPos);
                  boolean reachable = !path.isEmpty()
                          && path.get(path.size() - 1).distManhattan(goalPos) <= 1;
                  REACHABILITY.put(id, new CachedReachability(
                          goalPos, reachable, time + 6));
                  return reachable;
              }

          '''.replace('              ', '')
          pathfinder = replace_once(pathfinder, marker,
              reachability_method + marker, 'SCP-012 reachability method')
          pathfinder = replace_once(pathfinder,
              '    public static void clear(ServerPlayer player) {\n'
              '        if (player != null) CACHE.remove(player.getUUID());\n'
              '    }\n',
              '    public static void clear(ServerPlayer player) {\n'
              '        if (player == null) return;\n'
              '        CACHE.remove(player.getUUID());\n'
              '        REACHABILITY.remove(player.getUUID());\n'
              '    }\n',
              'SCP-012 cache clear')
          pathfinder = replace_once(pathfinder,
              '    private record CachedPath(BlockPos goal, List<BlockPos> nodes,\n'
              '                              long expiresAt, int index) {\n',
              '    private record CachedReachability(BlockPos goal, boolean reachable,\n'
              '                                      long expiresAt) {\n'
              '    }\n\n'
              '    private record CachedPath(BlockPos goal, List<BlockPos> nodes,\n'
              '                              long expiresAt, int index) {\n',
              'SCP-012 reachability record')
          pathfinder_path.write_text(pathfinder, encoding='utf-8')

          influence_path = Path('src/main/java/net/mcreator/scpadditions/scp012/Scp012InfluenceEvents.java')
          influence = influence_path.read_text(encoding='utf-8')
          influence = replace_once(influence,
              '        if (Scp714ProtectionAccess.isProtected(player)) {\n',
              '        if (!Scp012Pathfinder.hasOpenPath(level, player, attraction)) {\n'
              '            clearInfluence(player);\n'
              '            return;\n'
              '        }\n\n'
              '        if (Scp714ProtectionAccess.isProtected(player)) {\n',
              'SCP-012 open path gate')
          influence_path.write_text(influence, encoding='utf-8')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text(encoding='utf-8')
          changelog = changelog.replace(
              '- Hunts can end quickly or continue for several minutes depending on how long SCP-106 remains interested in the target.\n',
              '- Hunts can end quickly or continue for several minutes depending on how long SCP-106 remains interested in the target; players can create distance, but cannot simply despawn or lose SCP-106 before the hunt ends.\n', 1)
          if '## SCP-012\n' not in changelog:
              changelog = changelog.replace(
                  '## Interface fixes\n',
                  '## SCP-012\n\n- SCP-012 now begins manipulating a nearby player only when an open, traversable path exists between the player and the composition.\n\n## Interface fixes\n', 1)
          changelog_path.write_text(changelog, encoding='utf-8')

          Path('.github/workflows/build.yml').write_text('''name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
      - 'feature/**'
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Upload compiled JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
''', encoding='utf-8')

          git add .github/workflows/build.yml CHANGELOG.md \
            src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java \
            src/main/java/net/mcreator/scpadditions/client/Scp106CorrosionParticle.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012Pathfinder.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012InfluenceEvents.java \
            src/main/resources/assets/scp_additions/particles/scp_106_corrosion.json \
            src/main/resources/assets/scp_additions/textures/particle/scp_106_puddle.png
          git commit -m "Fix SCP-106 pursuit persistence and SCP-012 path gating"
          git push origin HEAD:master

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Upload compiled JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
