name: Apply SCP UBlocks integration

on:
  pull_request:
    branches:
      - integration/scp-additions-3.0
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply-build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply integration patch
        run: python3 scripts/apply_ublocks_integration.py

      - name: Validate resources and build
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('src/main/resources/assets/scp_ublocks').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          json.loads(Path('src/main/resources/assets/scp_additions/models/item/screwdriver.json').read_text(encoding='utf-8'))
          print('All SCP UBlocks and screwdriver JSON resources are valid.')
          PY
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit verified integration
        run: |
          rm -f scripts/apply_ublocks_integration.py
          rm -f .github/workflows/apply-ublocks-integration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Integrate SCP UBlocks assets and screwdriver texture"
          git push origin HEAD:${{ github.head_ref }}
