name: Apply remaining 3.0.7 changelog additions

on:
  push:
    branches:
      - master
    paths:
      - tools/hotfix/APPLY_REMAINING_CHANGELOG
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: python3 tools/hotfix/update_remaining_changelog.py
      - name: Commit and clean temporary updater
        shell: bash
        run: |
          rm tools/hotfix/update_remaining_changelog.py
          rm tools/hotfix/APPLY_REMAINING_CHANGELOG
          rm .github/workflows/apply-remaining-changelog.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md tools/hotfix .github/workflows/apply-remaining-changelog.yml
          git commit -m "Document remaining 3.0.7 gameplay fixes"
          git push origin HEAD:master
