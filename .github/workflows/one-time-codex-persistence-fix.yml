name: One-time Codex persistence fix

on:
  push:
    branches:
      - master
    paths:
      - tools/fix_codex_persistence.py

permissions:
  contents: write

jobs:
  fix-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply Codex persistence fix
        run: python tools/fix_codex_persistence.py

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit final fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/fix_codex_persistence.py
          rm -f .github/workflows/one-time-codex-persistence-fix.yml
          git add -A
          git commit -m "fix(codex): persist unique documents and world assets"
          git push origin HEAD:master
