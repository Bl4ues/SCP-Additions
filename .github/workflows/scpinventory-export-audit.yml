name: Audit canonical SCP Inventory export

on:
  push:
    branches:
      - integration/scp-additions-3.0

permissions:
  contents: read

jobs:
  audit:
    if: contains(github.event.head_commit.message, 'audit canonical SCP Inventory export tree')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout canonical export
        uses: actions/checkout@v4
        with:
          repository: Bl4ues/SCPInventory
          ref: integration/additions-3.0-export
          path: source
      - name: List canonical Java sources
        run: |
          find source/migration-export/java/com/bl4ues/scpinventory -type f \
            | sed 's#source/migration-export/java/##' \
            | sort
