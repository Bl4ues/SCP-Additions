name: Sync current documentation to NeoForge

on:
  push:
    branches:
      - master
    paths:
      - tools/hotfix/SYNC_CURRENT_DOCS_NEOFORGE
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: neoforge-1.21.1-port-3.0.7
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git fetch origin master
          git show origin/master:README.md > README.md
          git show origin/master:CHANGELOG.md > CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          git commit -m "Sync current README and changelog" || true
          git push origin HEAD:neoforge-1.21.1-port-3.0.7

  cleanup:
    if: always()
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/sync-current-docs-neoforge.yml tools/hotfix/SYNC_CURRENT_DOCS_NEOFORGE
          git commit -m "Remove temporary NeoForge documentation sync [skip ci]"
          git push origin HEAD:master
