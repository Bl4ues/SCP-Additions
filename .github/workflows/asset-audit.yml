name: Asset Audit

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Audit repository and compiled JAR
        shell: bash
        run: |
          set +e
          mkdir -p build/reports/asset-audit
          python3 scripts/audit_unused_assets.py 2>&1 | tee build/reports/asset-audit/audit.log
          status=${PIPESTATUS[0]}
          git rev-parse HEAD > build/reports/asset-audit/head-sha.txt
          git rev-parse 'HEAD^{tree}' > build/reports/asset-audit/tree-sha.txt
          git archive --format=zip --output=build/reports/asset-audit/source-snapshot.zip HEAD
          cp build/libs/*.jar build/reports/asset-audit/
          exit $status

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-audit-${{ github.sha }}
          path: build/reports/asset-audit
          if-no-files-found: error
