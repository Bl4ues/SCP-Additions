name: Apply SCP-106 and SCP-012 Fixes

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: startsWith(github.head_ref, 'automation/scp106-012-fix')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Apply prepared patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          awk '/^[[:space:]]*python - <<'"'"'PY'"'"'/{capture=1; next} capture && /^[[:space:]]*PY$/{exit} capture{sub(/^[[:space:]]{10}/, ""); print}' .github/workflows/build.yml > /tmp/apply_fix.py
          python /tmp/apply_fix.py

          rm -f .github/workflows/apply-scp106-012-fix.yml
          rm -f .github/scp106-012-fix-trigger
          git add .github/workflows/build.yml .github/workflows/apply-scp106-012-fix.yml .github/scp106-012-fix-trigger CHANGELOG.md \
            src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java \
            src/main/java/net/mcreator/scpadditions/client/Scp106CorrosionParticle.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012Pathfinder.java \
            src/main/java/net/mcreator/scpadditions/scp012/Scp012InfluenceEvents.java \
            src/main/resources/assets/scp_additions/particles/scp_106_corrosion.json \
            src/main/resources/assets/scp_additions/textures/particle/scp_106_puddle.png
          git commit -m "Fix SCP-106 pursuit persistence and SCP-012 path gating"
          git push origin HEAD:master
