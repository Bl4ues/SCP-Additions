name: Temporary Decontamination Collision Patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/decontamination-collision-breaks' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/decontamination-collision-breaks
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Apply controller safeguards
        id: patch
        shell: bash
        run: |
          set +e
          python tools/temporary_decon_collision_patch.py > patch-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            cp patch-output.txt /tmp/DECON_PATCH_ERROR.txt
            git restore .
            cp /tmp/DECON_PATCH_ERROR.txt .github/DECON_PATCH_ERROR.txt
          else
            rm -f .github/DECON_PATCH_ERROR.txt
          fi
      - name: Compile Java
        if: steps.patch.outputs.status == '0'
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew compileJava --stacktrace
      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.patch.outputs.status }}" != "0" ]; then
            git add -f .github/DECON_PATCH_ERROR.txt
            git commit -m "Capture decontamination patch error"
          else
            git add CHANGELOG.md src/main/java
            git add -A .github/DECON_PATCH_ERROR.txt
            if git diff --cached --quiet; then
              exit 0
            fi
            git commit -m "Guard animated structures while mining"
          fi
          git pull --rebase origin fix/decontamination-collision-breaks
          git push origin HEAD:fix/decontamination-collision-breaks
