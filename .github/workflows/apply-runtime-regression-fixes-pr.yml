name: Apply runtime fixes from PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-build:
    if: startsWith(github.head_ref, 'fix/neoforge-1.21.1-runtime-regressions-3.0.7') || startsWith(github.head_ref, 'fix/fabric-1.21.1-runtime-regressions-3.0.7')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Extract and apply repair script
        shell: bash
        run: |
          awk '
            /python <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-runtime-regression-fixes.yml > /tmp/apply_runtime_fixes.py
          test -s /tmp/apply_runtime_fixes.py

          # Apply all common source fixes first. Fabric resource migration is
          # inserted separately below because its short build.gradle has a
          # different processResources layout from NeoForge.
          if [[ "${{ github.head_ref }}" == fix/fabric-* ]]; then
            sed -i 's/if branch.startswith("fix\/fabric-"):/if False:/' /tmp/apply_runtime_fixes.py
          fi

          if ! python /tmp/apply_runtime_fixes.py > /tmp/apply-error.txt 2>&1; then
            cp /tmp/apply-error.txt .github/apply-runtime-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/apply-runtime-error.txt
            git commit -m "Record runtime repair failure" || true
            git push origin "HEAD:${{ github.head_ref }}" || true
            cat /tmp/apply-error.txt
            exit 1
          fi

          if [[ "${{ github.head_ref }}" == fix/fabric-* ]]; then
            python <<'PY'
          from pathlib import Path
          import subprocess

          path = Path("build.gradle")
          fabric = path.read_text(encoding="utf-8")
          if 'def legacyAssets = file("$buildDir/resources/main/assets/scp_unity_extra_blocks")' not in fabric:
              neo = subprocess.check_output(
                  ["git", "show", "origin/neoforge-1.21.1-port-3.0.7:build.gradle"],
                  text=True)
              start = neo.index("    doLast {")
              neo_end_marker = "\n    }\n}\n\ntasks.withType(JavaCompile)"
              end = neo.index(neo_end_marker, start) + len("\n    }")
              do_last = neo[start:end]

              fabric_end_marker = "\n}\n\ntasks.withType(JavaCompile)"
              insert_at = fabric.index(fabric_end_marker)
              fabric = fabric[:insert_at] + "\n\n" + do_last + fabric[insert_at:]
              path.write_text(fabric, encoding="utf-8")
          PY
          fi

          rm -f .github/apply-runtime-error.txt

      - name: Build corrected port
        shell: bash
        run: ./gradlew clean build --stacktrace

      - name: Validate packaged runtime resources
        shell: bash
        run: |
          JAR="$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          test -n "$JAR"
          jar tf "$JAR" | grep -q '^data/scp_additions/structure/scp_914_full.nbt$'
          jar tf "$JAR" | grep -q '^assets/scp_additions/blockstates/sl_1_floor_1.json$'
          jar tf "$JAR" | grep -q '^assets/scp_additions/models/item/sl_1_floor_detail_small.json$'

      - name: Commit corrected sources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Fix 1.21.1 runtime regressions"
          git push origin "HEAD:${{ github.head_ref }}"
