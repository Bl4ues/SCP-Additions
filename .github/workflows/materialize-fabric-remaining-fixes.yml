name: Materialize Fabric remaining fixes

on:
  push:
    branches:
      - master
    paths:
      - tools/hotfix/MATERIALIZE_FABRIC_REMAINING_FIXES
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fabric-1.21.1-port-3.0.7
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply hardened shared fixes
        shell: bash
        run: |
          git fetch origin master
          git show origin/master:tools/hotfix/fix_remaining_3_0_7_v2.py > /tmp/fix_remaining_3_0_7.py
          python3 /tmp/fix_remaining_3_0_7.py
      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java
          git commit -m "Fix live item rules, context targets, SCP-294 names and SCP-173 damage" || true
          git push origin HEAD:fabric-1.21.1-port-3.0.7

  cleanup:
    if: always()
    needs: materialize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/materialize-fabric-remaining-fixes.yml tools/hotfix/MATERIALIZE_FABRIC_REMAINING_FIXES
          git commit -m "Remove temporary Fabric remaining-fixes materializer [skip ci]"
          git push origin HEAD:master
