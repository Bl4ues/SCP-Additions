name: Apply requested integration fixes

on:
  push:
    branches:
      - integration/scp-additions-3.0
    paths:
      - .github/workflows/apply-requested-fixes.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout integration branch
        uses: actions/checkout@v4
        with:
          ref: integration/scp-additions-3.0

      - name: Write supplied default configs
        run: python3 scripts/requested_fix/write_defaults.py

      - name: Fix facility panels and key ownership
        run: python3 scripts/requested_fix/patch_facility_keys.py

      - name: Fix screwdriver interaction and fonts
        run: python3 scripts/requested_fix/patch_screwdriver_fonts.py

      - name: Fix first-run default loading
        run: python3 scripts/requested_fix/patch_defaults.py

      - name: Validate JSON defaults
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          files = [
              Path('config/scpinventory/context_interactions.json'),
              Path('config/scpinventory/scpinventory.json'),
              Path('config/scpadditions/294drinks.json'),
              Path('config/scpadditions/914recipes.json'),
              Path('config/scpadditions/modules.json'),
          ]
          for path in files:
              json.loads(path.read_text(encoding='utf-8'))
              print(f'Valid JSON: {path}')
          PY

      - name: Build integrated mod
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Remove temporary migration helpers
        run: |
          rm -rf scripts/requested_fix
          rm -f scripts/inspect_requested_fix_targets.py
          rm -f .github/workflows/inspect-requested-fix-targets.yml
          rm -f migration-reference/requested-fix-targets.txt
          rm -f .github/workflows/apply-requested-fixes.yml

      - name: Commit verified fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix integrated panels, UI, keycards and defaults"
          git push origin HEAD:integration/scp-additions-3.0
