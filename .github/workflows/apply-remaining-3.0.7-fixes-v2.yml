name: Apply and validate remaining 3.0.7 fixes v2

on:
  push:
    branches:
      - master
    paths:
      - tools/hotfix/APPLY_REMAINING_FIXES_V2
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  apply-and-validate:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - loader: Forge
            branch: master
            java: '17'
            pr: 'none'
          - loader: NeoForge
            branch: neoforge-1.21.1-port-3.0.7
            java: '21'
            pr: '42'
          - loader: Fabric
            branch: fabric-1.21.1-port-3.0.7
            java: '21'
            pr: '43'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch shared hotfix
        shell: bash
        run: |
          git fetch origin master
          git show origin/master:tools/hotfix/fix_remaining_3_0_7_v2.py > /tmp/fix_remaining_3_0_7.py

      - name: Apply source fixes
        run: python3 /tmp/fix_remaining_3_0_7.py

      - name: Commit materialized fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java
          git commit -m "Fix live item rules, context targets, SCP-294 names and SCP-173 damage" || true
          git push origin HEAD:${{ matrix.branch }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Verify source regression guards
        shell: bash
        run: |
          git diff --exit-code -- src/main/java
          grep -q 'reloadFromDisk()' src/main/java/com/bl4ues/scpinventory/config/ScpInventoryConfig.java
          grep -q 'ScpInventoryConfig.reloadFromDisk();' src/main/java/com/bl4ues/scpinventory/config/ItemConfigManager.java
          grep -Eq 'ENTITY_TYPES\.containsKey\(id\)|ENTITY_TYPE\.containsKey\(id\)' src/main/java/com/bl4ues/scpinventory/context/ContextInteractionRegistry.java
          ! grep -q 'gas_mask:scp_1499' src/main/java/com/bl4ues/scpinventory/context/ContextInteractionRegistry.java
          grep -q 'while (path.startsWith("cup_of_"))' src/main/java/net/mcreator/scpadditions/item/CoffeeItem.java
          grep -q 'DAMAGE_THRESHOLD = 6.0F' src/main/java/net/mcreator/scpadditions/event/Scp173DurabilityEvents.java
          ! grep -q 'DAMAGE_MULTIPLIER' src/main/java/net/mcreator/scpadditions/event/Scp173DurabilityEvents.java

      - name: Build ${{ matrix.loader }} edition
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon --stacktrace

      - name: Create and tick a dedicated world
        shell: bash
        run: |
          mkdir -p run run/server
          printf 'eula=true\n' > run/eula.txt
          printf 'eula=true\n' > run/server/eula.txt
          set +e
          timeout 150s ./gradlew runServer --no-daemon --console=plain > remaining-fixes-server.log 2>&1
          status=$?
          set -e
          cat remaining-fixes-server.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi
          grep -q "Done (" remaining-fixes-server.log
          ! grep -Eqi "Encountered an unexpected exception|Exception in server tick loop|Failed to start the minecraft server|Could not execute entrypoint" remaining-fixes-server.log

      - name: Start graphical client
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          set +e
          timeout 120s xvfb-run -a ./gradlew runClient --no-daemon --console=plain > remaining-fixes-client.log 2>&1
          status=$?
          set -e
          cat remaining-fixes-client.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi
          grep -Eq "Setting user:|Backend library:" remaining-fixes-client.log
          ! grep -Eqi "Could not execute entrypoint|The game crashed whilst|Encountered an unexpected exception|Exception in thread.*(Render|Client)" remaining-fixes-client.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.loader }}-remaining-3.0.7-fixes-v2
          path: |
            build/libs/*.jar
            remaining-fixes-server.log
            remaining-fixes-client.log
            run/logs/latest.log
            run/server/logs/latest.log
            run/client/logs/latest.log
            run/crash-reports/**
            run/server/crash-reports/**
            run/client/crash-reports/**

      - name: Report port validation
        if: always() && matrix.pr != 'none'
        shell: bash
        run: |
          head_sha=$(git rev-parse HEAD)
          gh pr comment '${{ matrix.pr }}' --repo '${{ github.repository }}' --body "### ${{ matrix.loader }} remaining-fixes v2 validation: **${{ job.status }}**

          - Tested head: \`$head_sha\`
          - Checks: live item-rule reload, missing context-target rejection, SCP-294 cup naming, SCP-173 damage rules, clean build, dedicated world ticks, and graphical client startup
          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Manual gameplay and multiplayer QA are still required."

  cleanup:
    if: always()
    needs: apply-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove temporary hotfix materializer
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/apply-remaining-3.0.7-fixes-v2.yml tools/hotfix/fix_remaining_3_0_7_v2.py tools/hotfix/APPLY_REMAINING_FIXES_V2
          git commit -m "Remove temporary remaining-fixes v2 materializer [skip ci]"
          git push origin HEAD:master
