name: Apply SCP-106 Audio Polish

on:
  push:
    branches:
      - feature/scp106-audio-polish

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scp106-audio-polish
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Apply integration changes
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          def replace(path_text, old, new):
              path = Path(path_text)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Missing replacement in {path_text}: {old[:160]!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace(
              'src/main/java/net/mcreator/scpadditions/ScpAdditionsMod.java',
              'import net.mcreator.scpadditions.init.ScpAdditionsModSounds;\n',
              'import net.mcreator.scpadditions.init.ScpAdditionsModSounds;\nimport net.mcreator.scpadditions.init.Scp106Sounds;\n')
          replace(
              'src/main/java/net/mcreator/scpadditions/ScpAdditionsMod.java',
              '        ScpAdditionsModSounds.REGISTRY.register(bus);\n',
              '        ScpAdditionsModSounds.REGISTRY.register(bus);\n        Scp106Sounds.REGISTRY.register(bus);\n')
          replace(
              'src/main/java/net/mcreator/scpadditions/ScpAdditionsMod.java',
              '    private static final String PROTOCOL_VERSION = "13";',
              '    private static final String PROTOCOL_VERSION = "14";')

          replace(
              'src/main/java/net/mcreator/scpadditions/network/ScpEntityNetwork.java',
              '''        ScpAdditionsMod.addNetworkMessage(Scp079DecisionPacket.class,
                Scp079DecisionPacket::encode,
                Scp079DecisionPacket::decode,
                Scp079DecisionPacket::handle);
''',
              '''        ScpAdditionsMod.addNetworkMessage(Scp079DecisionPacket.class,
                Scp079DecisionPacket::encode,
                Scp079DecisionPacket::decode,
                Scp079DecisionPacket::handle);
        ScpAdditionsMod.addNetworkMessage(Scp106ChasePacket.class,
                Scp106ChasePacket::encode,
                Scp106ChasePacket::decode,
                Scp106ChasePacket::handle);
''')
          replace(
              'src/main/java/net/mcreator/scpadditions/network/ScpEntityNetwork.java',
              '''    public static void openKeycardReaderScreen(ServerPlayer player,
''',
              '''    public static void setScp106Chase(ServerPlayer player,
            boolean active) {
        if (player == null) return;
        ScpAdditionsMod.PACKET_HANDLER.send(
                PacketDistributor.PLAYER.with(() -> player),
                new Scp106ChasePacket(active));
    }

    public static void playEnterSound(ServerPlayer player) {
        if (player == null) return;
        ScpAdditionsMod.PACKET_HANDLER.send(
                PacketDistributor.PLAYER.with(() -> player),
                new EnterSoundPacket());
    }

    public static void openKeycardReaderScreen(ServerPlayer player,
''')

          replace(
              'src/main/java/net/mcreator/scpadditions/config/ScpAdditionsModulesConfig.java',
              '''		public Toggle blink = new Toggle();
		public Debug debug = new Debug();
''',
              '''		public Toggle blink = new Toggle();
		public Audio audio = new Audio();
		public Debug debug = new Debug();
''')
          replace(
              'src/main/java/net/mcreator/scpadditions/config/ScpAdditionsModulesConfig.java',
              '''			if (blink == null) blink = new Toggle();
			if (debug == null) debug = new Debug();
''',
              '''			if (blink == null) blink = new Toggle();
			if (audio == null) audio = new Audio();
			if (debug == null) debug = new Debug();
''')
          replace(
              'src/main/java/net/mcreator/scpadditions/config/ScpAdditionsModulesConfig.java',
              '''	public static final class Debug {
''',
              '''	public static final class Audio {
		@SerializedName("enter_sound_enabled")
		public boolean enterSoundEnabled = true;
	}

	public static final class Debug {
''')

          replace(
              'src/main/java/net/mcreator/scpadditions/config/ui/ConfigCenterService.java',
              'for (String group : List.of("inventory", "interactions", "hud", "vitals", "blink", "scp_173"))',
              'for (String group : List.of("inventory", "interactions", "hud", "vitals", "blink", "audio", "scp_173"))')
          replace(
              'src/main/java/net/mcreator/scpadditions/config/ui/ConfigCenterService.java',
              '''        checkBoolean(root, "blink", "enabled", errors);
        checkBoolean(root, "scp_173", "enabled", errors);
''',
              '''        checkBoolean(root, "blink", "enabled", errors);
        checkBoolean(root, "audio", "enter_sound_enabled", errors);
        checkBoolean(root, "scp_173", "enabled", errors);
''')
          replace(
              'src/main/java/net/mcreator/scpadditions/config/ui/ConfigCenterService.java',
              '''return JsonParser.parseString("{\\"inventory\\":{\\"enabled\\":true,\\"remember_ui_state\\":true},\\"interactions\\":{\\"enabled\\":true,\\"disable_in_creative\\":false},\\"hud\\":{\\"enabled\\":true},\\"vitals\\":{\\"custom_health_enabled\\":true,\\"stamina_enabled\\":true,\\"horror_movement_enabled\\":true},\\"blink\\":{\\"enabled\\":true},\\"scp_173\\":{\\"enabled\\":true,\\"natural_spawn_enabled\\":true}}").getAsJsonObject();''',
              '''return JsonParser.parseString("{\\"inventory\\":{\\"enabled\\":true,\\"remember_ui_state\\":true},\\"interactions\\":{\\"enabled\\":true,\\"disable_in_creative\\":false},\\"hud\\":{\\"enabled\\":true},\\"vitals\\":{\\"custom_health_enabled\\":true,\\"stamina_enabled\\":true,\\"horror_movement_enabled\\":true},\\"blink\\":{\\"enabled\\":true},\\"audio\\":{\\"enter_sound_enabled\\":true},\\"scp_173\\":{\\"enabled\\":true,\\"natural_spawn_enabled\\":true}}").getAsJsonObject();''')

          replace(
              'src/main/java/net/mcreator/scpadditions/config/ui/ConfigCenterClient.java',
              '''                new ToggleSpec("blink", "enabled", "Blink System", "Enables automatic and manual blinking.", true),
                new ToggleSpec("scp_173", "enabled", "SCP-173", "Enables SCP-173 behavior.", true),
''',
              '''                new ToggleSpec("blink", "enabled", "Blink System", "Enables automatic and manual blinking.", true),
                new ToggleSpec("audio", "enter_sound_enabled", "World Entry Sound", "Plays enter.ogg after joining or opening a world.", true),
                new ToggleSpec("scp_173", "enabled", "SCP-173", "Enables SCP-173 behavior.", true),
''')

          replace(
              'src/main/java/net/mcreator/scpadditions/event/Scp106SpawnEvents.java',
              'if (Scp106SpawnSuppression.isSuppressed(server)) {',
              'if (Scp106SpawnSuppression.consumeSuppressedCheck(server)) {')

          replace(
              'src/main/java/net/mcreator/scpadditions/roamer/Scp106EmergenceLocator.java',
              '''            return new Placement(center,
                    yawFor(outward.getStepX(), outward.getStepZ()),
                    Emergence.WALL);
''',
              '''            return new Placement(center,
                    Mth.wrapDegrees(yawFor(outward.getStepX(),
                            outward.getStepZ()) + 180.0F),
                    Emergence.WALL);
''')

          sounds_path = Path('src/main/resources/assets/scp_additions/sounds.json')
          sounds = json.loads(sounds_path.read_text(encoding='utf-8'))
          sounds['scp_106_phase'] = {
              'subtitle': 'subtitles.scp_additions.scp_106_phase',
              'sounds': [
                  {'name': 'scp_additions:106phase_1', 'stream': False, 'volume': 1.0},
                  {'name': 'scp_additions:10phase_2', 'stream': False, 'volume': 1.0},
                  {'name': 'scp_additions:106phase_3', 'stream': False, 'volume': 1.0}
              ]
          }
          sounds['scp_106_chase'] = {
              'sounds': [{'name': 'scp_additions:106chase', 'stream': True, 'volume': 1.0}]
          }
          sounds['scp_106_stop'] = {
              'sounds': [{'name': 'scp_additions:106stop', 'stream': False, 'volume': 1.0}]
          }
          sounds['enter'] = {
              'sounds': [{'name': 'scp_additions:enter', 'stream': True, 'volume': 1.0}]
          }
          sounds_path.write_text(json.dumps(sounds, ensure_ascii=False,
                  separators=(',', ':')) + '\n', encoding='utf-8')

          for lang_name, subtitle in (
                  ('en_us.json', 'SCP-106 phases through a surface'),
                  ('pt_br.json', 'SCP-106 atravessa uma superfície')):
              path = Path('src/main/resources/assets/scp_additions/lang') / lang_name
              if not path.exists():
                  continue
              data = json.loads(path.read_text(encoding='utf-8'))
              data['subtitles.scp_additions.scp_106_phase'] = subtitle
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2)
                      + '\n', encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          start = text.index('## SCP-106\n')
          end = text.index('## SCP-173\n', start)
          section = '''## SCP-106

- Added SCP-106 as a new roaming threat, including its model, animations, sounds, and spawn egg;
- SCP-106 can appear naturally after the player has spent some time in the world, emerging from the ground or nearby walls before immediately beginning a hunt;
- Added close-range attacks that deal damage and apply Wither;
- Added a ranged attack that throws a straight trail of corrosion across the floor when the player creates distance but remains in clear view, dealing damage, Wither, and Slowness on a direct hit;
- Corrosion left by SCP-106 remains for longer and continuously slows Survival players who walk over it;
- SCP-106 can phase through solid blocks, moving more slowly while inside them and leaving temporary portals on the surfaces it enters and exits;
- If the player creates too much distance, SCP-106 can disappear and re-emerge ahead of the player's path, while sometimes using its ranged attack instead when it has a clear shot;
- Added positional phasing sounds and a private chase soundtrack heard only by the hunted player, with a smooth fade and ending cue when the hunt finishes;
- SCP-106 ignores Creative and Spectator players, and disappears when its target dies if no other valid player is nearby;
- Tesla Gates repel SCP-106 instead of killing it, forcing it to sink away and preventing the next two natural spawn checks;
- Hunts can end quickly or continue for several minutes depending on how long SCP-106 remains interested in the target; players can create distance, but cannot simply despawn or lose SCP-106 before the hunt ends.

'''
          changelog.write_text(text[:start] + section + text[end:],
                  encoding='utf-8')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/apply-scp106-audio-polish.yml

      - name: Build
        run: chmod +x gradlew && ./gradlew clean build --stacktrace

      - name: Commit integrated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java src/main/resources CHANGELOG.md .github/workflows/apply-scp106-audio-polish.yml
          git commit -m "Integrate SCP-106 audio and encounter polish"
          git push origin HEAD:feature/scp106-audio-polish
