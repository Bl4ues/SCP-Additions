name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
      - 'feature/**'
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        shell: bash
        run: |
          set +e
          ./gradlew clean build --stacktrace > build-output.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 build-output.log
          fi
          exit "$status"

      - name: Upload compiled JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
