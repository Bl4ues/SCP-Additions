name: Temporary SCP-131 Separation Validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  validate:
    if: github.head_ref == 'feature/scp079-scp131-separation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scp079-scp131-separation
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Fix missing network import
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/main/java/net/mcreator/scpadditions/facility/Scp079FacilityThreatEvents.java')
          text = path.read_text(encoding='utf-8')
          line = 'import net.mcreator.scpadditions.network.ScpEntityNetwork;\n'
          if line not in text:
              marker = 'import net.mcreator.scpadditions.init.ScpAdditionsModGameRules;\n'
              if marker not in text:
                  raise SystemExit('Could not locate SCP-079 import insertion point')
              text = text.replace(marker, marker + line, 1)
              path.write_text(text, encoding='utf-8')
      - name: Compile
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew compileJava --stacktrace
      - name: Commit import
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java/net/mcreator/scpadditions/facility/Scp079FacilityThreatEvents.java
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix SCP-131 separation build"
          git pull --rebase origin feature/scp079-scp131-separation
          git push origin HEAD:feature/scp079-scp131-separation
