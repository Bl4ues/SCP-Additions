name: Fix canonical SCP Inventory adapters

on:
  push:
    branches:
      - integration/scp-additions-3.0

permissions:
  contents: write

jobs:
  fix:
    if: contains(github.event.head_commit.message, 'run canonical adapter fixes')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply adapter fixes
        run: python3 scripts/fix_canonical_scpinventory_adapters.py
      - name: Commit adapter fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/main/java/com/bl4ues/scpinventory
          git commit -m "fix(inventory): adapt canonical systems to Additions"
          git push origin HEAD:integration/scp-additions-3.0
