name: One-time inventory disable migration

on:
  push:
    branches:
      - master
    paths:
      - tools/inventory_disable_migration_trigger.txt

permissions:
  contents: write

jobs:
  apply-build-server-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply migration
        run: python tools/apply_inventory_disable_migration.py

      - name: Clean build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Dedicated server smoke test
        shell: bash
        run: |
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          set +e
          timeout 180s ./gradlew runServer --stacktrace > /tmp/inventory-migration-server.log 2>&1
          status=$?
          set -e
          tail -n 180 /tmp/inventory-migration-server.log
          if grep -q "Attempted to load class .* for invalid dist DEDICATED_SERVER" /tmp/inventory-migration-server.log; then exit 1; fi
          if grep -q "has failed to load correctly" /tmp/inventory-migration-server.log; then exit 1; fi
          if grep -q "Done (" /tmp/inventory-migration-server.log || grep -q "For help, type" /tmp/inventory-migration-server.log; then exit 0; fi
          echo "Dedicated server did not reach running state; exit code: $status"
          exit 1

      - name: Commit final migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tools/apply_inventory_disable_migration.py
          rm -f tools/inventory_disable_migration_trigger.txt
          rm -f .github/workflows/one-time-inventory-disable-migration.yml
          git add -A
          git commit -m "fix(inventory): restore stored items when module disables"
          git push origin HEAD:master
