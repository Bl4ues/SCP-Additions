name: SCP-012 Compile Diagnostics

on:
  pull_request:
    branches:
      - master
    types:
      - synchronize

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Capture compile output
        shell: bash
        run: |
          set +e
          ./gradlew clean compileJava --stacktrace > scp012-build.log 2>&1
          echo $? > scp012-build.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: scp012-compile-diagnostics
          path: |
            scp012-build.log
            scp012-build.exit
          if-no-files-found: error
