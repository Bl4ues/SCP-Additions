name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
      - 'feature/**'
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ startsWith(github.head_ref, 'neoforge-1.21.1-port') && '21' || '17' }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply NeoForge port migrations
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port')
        shell: bash
        run: |
          set +e
          : > neoforge-migration.log
          scripts=(
            apply_tick_bridge.py
            apply_network_bridge.py
            apply_inventory_attachment.py
            apply_player_variables_attachment.py
            apply_saved_data_api.py
            apply_inventory_stack_serialization.py
            apply_misc_api_moves.py
            apply_item_custom_data.py
            apply_item_api_renames.py
            apply_core_api_moves.py
            apply_capability_and_ui_api.py
            apply_gameplay_api_round2.py
            apply_gameplay_api_round3.py
            apply_gameplay_api_round4.py
            apply_gameplay_api_round5.py
          )
          status=0
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee -a neoforge-migration.log
            python3 "tools/neoforge_port/$script" 2>&1 | tee -a neoforge-migration.log
            current=${PIPESTATUS[0]}
            if [ "$current" -ne 0 ]; then
              status="$current"
              break
            fi
          done
          git diff --binary > neoforge-transformed.patch
          exit "$status"

      - name: Upload migration diagnostics
        if: always() && startsWith(github.head_ref, 'neoforge-1.21.1-port')
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-migration-${{ github.event.pull_request.head.sha }}
          path: neoforge-migration.log
          if-no-files-found: error

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build NeoForge port and preserve frontier
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port')
        shell: bash
        run: |
          set +e
          ./gradlew clean build --no-daemon --stacktrace > neoforge-build.log 2>&1
          status=$?
          echo "$status" > neoforge-build.exitcode
          grep -E "^.*error:|FAILURE:|What went wrong|BUILD (SUCCESSFUL|FAILED)" neoforge-build.log | head -n 2500 > neoforge-build-errors.log || true
          tail -n 600 neoforge-build.log
          exit 0

      - name: Build Forge branches
        if: ${{ !startsWith(github.head_ref, 'neoforge-1.21.1-port') }}
        run: ./gradlew clean build --stacktrace

      - name: Export transformed NeoForge worktree
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port')
        shell: bash
        run: |
          zip -qr neoforge-transformed-source.zip . \
            -x '.git/*' 'build/*' '.gradle/*' 'run/*' '*.zip'

      - name: Upload NeoForge build frontier
        if: always() && startsWith(github.head_ref, 'neoforge-1.21.1-port')
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-build-${{ github.event.pull_request.head.sha }}
          path: |
            neoforge-build.log
            neoforge-build-errors.log
            neoforge-build.exitcode
            neoforge-transformed.patch
            neoforge-transformed-source.zip
            build/libs/*.jar
            build/reports/**
          if-no-files-found: error

      - name: Verify NeoForge build result
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port')
        shell: bash
        run: test "$(cat neoforge-build.exitcode)" = "0"

      - name: Upload NeoForge compiled JAR
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port') && success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-neoforge-${{ github.event.pull_request.head.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Launch NeoForge dedicated server smoke test
        if: startsWith(github.head_ref, 'neoforge-1.21.1-port') && success()
        shell: bash
        run: |
          set +e
          mkdir -p run/server
          printf 'eula=true\n' > run/server/eula.txt
          cat > run/server/server.properties <<'EOF'
          online-mode=false
          server-port=25576
          motd=SCP Additions NeoForge smoke test
          view-distance=4
          simulation-distance=4
          spawn-protection=0
          max-tick-time=120000
          EOF
          : > neoforge-server-console.log
          setsid ./gradlew runServer --no-daemon --console=plain > neoforge-server-console.log 2>&1 &
          launcher_pid=$!
          started=0
          for second in $(seq 1 300); do
            if test -f run/server/logs/latest.log && grep -Fq 'Done (' run/server/logs/latest.log; then
              started=1
              echo "Dedicated server reached ready state after ${second}s."
              break
            fi
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -INT -- "-$launcher_pid" 2>/dev/null || true
            for wait_second in $(seq 1 25); do
              kill -0 "$launcher_pid" 2>/dev/null || break
              sleep 1
            done
          fi
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -KILL -- "-$launcher_pid" 2>/dev/null || true
          fi
          wait "$launcher_pid" 2>/dev/null || true
          test -f run/server/logs/latest.log && cp run/server/logs/latest.log neoforge-server-latest.log
          if test "$started" != "1"; then
            echo 'Dedicated server did not reach the ready state.'
            tail -n 400 neoforge-server-console.log
            exit 1
          fi
          if grep -Eqi 'Exception in server tick loop|Failed to start the minecraft server|Mod loading has failed|Loading errors encountered' neoforge-server-console.log neoforge-server-latest.log 2>/dev/null; then
            echo 'Dedicated server log contains a fatal startup error.'
            tail -n 400 neoforge-server-console.log
            exit 1
          fi
          exit 0

      - name: Upload NeoForge server smoke logs
        if: always() && startsWith(github.head_ref, 'neoforge-1.21.1-port')
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-server-smoke-${{ github.event.pull_request.head.sha }}
          path: |
            neoforge-server-console.log
            neoforge-server-latest.log
            run/server/crash-reports/**
          if-no-files-found: warn

      - name: Upload compiled JAR
        if: ${{ success() && !startsWith(github.head_ref, 'neoforge-1.21.1-port') }}
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
