name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        id: gradle-build
        shell: bash
        run: |
          set +e
          ./gradlew clean build --stacktrace > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Upload diagnostic build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 1
