name: Manual flow smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  inventory-flow:
    if: startsWith(github.head_ref, 'fix/neoforge-1.21.1-runtime-regressions-3.0.7')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install temporary in-game inventory flow harness
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          events = Path('src/main/java/com/bl4ues/scpinventory/client/ClientGameplayEvents.java')
          text = events.read_text(encoding='utf-8')
          needle = '        if (event.phase == TickEvent.Phase.START) {\n'
          replacement = needle + '            ManualFlowHarness.clientTick();\n'
          if needle not in text:
              raise SystemExit('Client tick insertion point missing')
          events.write_text(text.replace(needle, replacement, 1), encoding='utf-8')

          harness = r'''package com.bl4ues.scpinventory.client;

          import java.io.File;
          import java.lang.reflect.Method;
          import java.lang.reflect.Modifier;
          import java.nio.file.Files;
          import java.nio.file.Path;

          import com.bl4ues.scpinventory.client.gui.ScpInventoryScreen;

          import net.minecraft.client.Minecraft;
          import net.minecraft.client.gui.screens.Screen;

          public final class ManualFlowHarness {
              private static int ticks;
              private static boolean opened;
              private static boolean captured;

              private ManualFlowHarness() {
              }

              public static void clientTick() {
                  Minecraft minecraft = Minecraft.getInstance();
                  if (minecraft.level == null || minecraft.player == null) {
                      return;
                  }
                  ticks++;
                  if (!opened && ticks >= 40) {
                      opened = true;
                      try {
                          Screen screen = new ScpInventoryScreen();
                          minecraft.setScreen(screen);
                          writeMarker("opened=" + screen.getClass().getName());
                      } catch (Throwable error) {
                          writeMarker("open-failed=" + error);
                          throw new RuntimeException("Manual SCP inventory flow failed", error);
                      }
                  }
                  if (opened && !captured && ticks >= 80) {
                      captured = true;
                      Screen current = minecraft.screen;
                      writeMarker("current=" + (current == null ? "null" : current.getClass().getName()));
                      capture(minecraft, Path.of("manual-flow.png"));
                  }
              }

              private static void capture(Minecraft minecraft, Path output) {
                  try {
                      Object target = minecraft.getMainRenderTarget();
                      Class<?> screenshot = Class.forName("net.minecraft.client.Screenshot");
                      Object image = null;
                      for (Method method : screenshot.getDeclaredMethods()) {
                          if (!Modifier.isStatic(method.getModifiers())
                                  || method.getParameterCount() != 1
                                  || !method.getParameterTypes()[0].isInstance(target)
                                  || method.getReturnType() == void.class) {
                              continue;
                          }
                          method.setAccessible(true);
                          image = method.invoke(null, target);
                          if (image != null) {
                              break;
                          }
                      }
                      if (image == null) {
                          throw new IllegalStateException("Screenshot image method not found");
                      }
                      boolean written = false;
                      for (Method method : image.getClass().getMethods()) {
                          if (!method.getName().equals("writeToFile")
                                  || method.getParameterCount() != 1) {
                              continue;
                          }
                          Class<?> parameter = method.getParameterTypes()[0];
                          Object value;
                          if (parameter == Path.class) {
                              value = output;
                          } else if (parameter == File.class) {
                              value = output.toFile();
                          } else {
                              continue;
                          }
                          method.invoke(image, value);
                          written = true;
                          break;
                      }
                      if (image instanceof AutoCloseable closeable) {
                          closeable.close();
                      }
                      if (!written) {
                          throw new IllegalStateException("Native image writer not found");
                      }
                  } catch (Throwable error) {
                      writeMarker("capture-failed=" + error);
                      throw new RuntimeException("Manual screenshot failed", error);
                  }
              }

              private static void writeMarker(String line) {
                  try {
                      Files.writeString(Path.of("manual-flow-screen.txt"), line + System.lineSeparator(),
                              java.nio.file.StandardOpenOption.CREATE,
                              java.nio.file.StandardOpenOption.APPEND);
                  } catch (Exception error) {
                      throw new RuntimeException(error);
                  }
              }
          }
          '''
          out = Path('src/main/java/com/bl4ues/scpinventory/client/ManualFlowHarness.java')
          out.write_text('\n'.join(line[10:] if line.startswith('          ') else line
                                   for line in harness.splitlines()) + '\n', encoding='utf-8')
          PY

      - name: Build instrumented test client
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon --stacktrace

      - name: Generate survival singleplayer world
        shell: bash
        run: |
          mkdir -p run/server
          cat > run/server/eula.txt <<'EOF'
          eula=true
          EOF
          cat > run/server/server.properties <<'EOF'
          online-mode=false
          gamemode=survival
          force-gamemode=true
          level-name=FlowTest
          spawn-protection=0
          view-distance=4
          simulation-distance=4
          EOF
          set +e
          timeout --signal=INT --kill-after=20s 100s \
            ./gradlew runServer --no-daemon --console=plain \
            > flow-server.log 2>&1
          status=$?
          set -e
          cat flow-server.log
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ] && [ "$status" -ne 130 ]; then
            exit "$status"
          fi
          grep -q 'Done (' flow-server.log
          test -f run/server/FlowTest/level.dat
          mkdir -p run/client/saves
          cp -a run/server/FlowTest run/client/saves/FlowTest

      - name: Open and capture SCP inventory inside the game
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          mkdir -p run/client
          cat > run/client/options.txt <<'EOF'
          guiScale:2
          pauseOnLostFocus:false
          skipMultiplayerWarning:true
          joinedFirstServer:true
          EOF
          set +e
          timeout --signal=INT --kill-after=20s 220s \
            xvfb-run -a -s '-screen 0 1920x1080x24' \
            ./gradlew runClient --no-daemon --console=plain \
              --args="--quickPlaySingleplayer FlowTest" \
              > flow-client.log 2>&1 &
          client_wrapper_pid=$!
          success=0
          for i in $(seq 1 210); do
            if [ -f run/client/manual-flow-screen.txt ] \
                && grep -q 'current=com.bl4ues.scpinventory.client.gui.ScpInventoryScreen' run/client/manual-flow-screen.txt \
                && [ -s run/client/manual-flow.png ]; then
              success=1
              break
            fi
            kill -0 "$client_wrapper_pid" 2>/dev/null || break
            sleep 1
          done
          kill -INT "$client_wrapper_pid" 2>/dev/null || true
          wait "$client_wrapper_pid"
          process_status=$?
          set -e
          cat run/client/manual-flow-screen.txt 2>/dev/null || true
          cat flow-client.log || true
          [ "$success" -eq 1 ] || exit 91
          if [ "$process_status" -ne 0 ] && [ "$process_status" -ne 124 ] && [ "$process_status" -ne 130 ]; then
            grep -Eqi 'Manual SCP inventory flow failed|The game crashed whilst|Description: Rendering screen' flow-client.log run/client/logs/latest.log 2>/dev/null && exit "$process_status"
          fi
          ! grep -Eqi "The game crashed whilst|Description: Rendering screen|Exception in thread \"Render thread\"|Parsing error loading recipe scp_additions" flow-client.log run/client/logs/latest.log 2>/dev/null

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: neoforge-manual-flow-${{ github.event.pull_request.head.sha }}
          path: |
            run/client/manual-flow.png
            run/client/manual-flow-screen.txt
            flow-server.log
            flow-client.log
            run/client/logs/latest.log
            build/libs/*.jar
          if-no-files-found: warn
