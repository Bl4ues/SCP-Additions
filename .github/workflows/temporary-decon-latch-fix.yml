name: Temporary Decontamination Latch Fix

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/decontamination-collision-breaks' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/decontamination-collision-breaks
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Correct interrupted close latch
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/main/java/net/mcreator/scpadditions/procedures/DecontaminationCheckpointController.java')
          text = path.read_text(encoding='utf-8')
          old = '''            BlockState current = level.getBlockState(pos);
                      if (!current.is(ScpAdditionsModBlocks.DECON_OPEN.get())
                              || FacilityStructureBreakGuard.isBeingMined(level, pos)) {
                          return;
                      }
          '''
          new = '''            BlockState current = level.getBlockState(pos);
                      if (!current.is(ScpAdditionsModBlocks.DECON_OPEN.get())) {
                          return;
                      }
                      if (FacilityStructureBreakGuard.isBeingMined(level, pos)) {
                          LATCHED_UNTIL_EXIT.remove(key);
                          return;
                      }
          '''
          if old not in text:
              raise SystemExit('Could not locate delayed decontamination close guard')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Compile Java
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew compileJava --stacktrace
      - name: Commit correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java/net/mcreator/scpadditions/procedures/DecontaminationCheckpointController.java
          git commit -m "Retry decontamination closure after mining"
          git pull --rebase origin fix/decontamination-collision-breaks
          git push origin HEAD:fix/decontamination-collision-breaks
