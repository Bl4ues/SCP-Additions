name: Temporary SCP-131 Separation PR Patch

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/scp079-scp131-separation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/scp079-scp131-separation
          fetch-depth: 0
      - name: Apply implementation
        id: patch
        shell: bash
        run: |
          set +e
          rm -f .github/SCP131_PATCH_ERROR.txt
          python - <<'PY'
          from pathlib import Path
          import re
          path = Path('src/main/java/net/mcreator/scpadditions/facility/Scp079FacilityThreatEvents.java')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'(?m)^\s+int lockDurationTicks,$',
                        '                                  int lockDurationTicks,',
                        text, count=1)
          text = re.sub(r'(?m)^\s+double minimumLockDistance\) \{$',
                        '                                  double minimumLockDistance) {',
                        text, count=1)
          path.write_text(text, encoding='utf-8')
          PY
          python tools/temporary_scp131_separation_patch.py > patch-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            cp patch-output.txt .github/SCP131_PATCH_ERROR.txt
          fi
      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.patch.outputs.status }}" != "0" ]; then
            git add .github/SCP131_PATCH_ERROR.txt
            git commit -m "Capture SCP-131 patch error"
            git push origin HEAD:feature/scp079-scp131-separation
            exit 0
          fi
          if git diff --quiet; then
            exit 0
          fi
          git add CHANGELOG.md src/main/java .github/SCP131_PATCH_ERROR.txt
          git commit -m "Add SCP-079 SCP-131 separation strategy"
          git push origin HEAD:feature/scp079-scp131-separation
