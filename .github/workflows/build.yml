name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
      - 'feature/**'
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix 3.0.7 changelog spacing
        if: github.event_name == 'push' && github.ref == 'refs/heads/feature/cleanup-unused-assets'
        run: |
          cat > /tmp/fix_changelog.py <<'PY'
          from pathlib import Path

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          old = "# SCP Additions 3.0.6 — Hazards & Survival Update\n## Audio licensing"
          new = "# SCP Additions 3.0.6 — Hazards & Survival Update\n\n## Audio licensing"
          if old not in text:
              raise SystemExit("Expected changelog spacing target was not found")
          changelog.write_text(text.replace(old, new, 1), encoding="utf-8")

          workflow_lines = [
              "name: Build",
              "",
              "on:",
              "  push:",
              "    branches:",
              "      - master",
              "      - integration/scp-additions-3.0",
              "      - 'feature/**'",
              "  pull_request:",
              "    branches:",
              "      - master",
              "      - integration/scp-additions-3.0",
              "",
              "permissions:",
              "  contents: read",
              "",
              "jobs:",
              "  build:",
              "    runs-on: ubuntu-latest",
              "",
              "    steps:",
              "      - name: Checkout",
              "        uses: actions/checkout@v4",
              "",
              "      - name: Set up Java 17",
              "        uses: actions/setup-java@v4",
              "        with:",
              "          distribution: temurin",
              "          java-version: '17'",
              "",
              "      - name: Set up Gradle",
              "        uses: gradle/actions/setup-gradle@v4",
              "",
              "      - name: Make Gradle wrapper executable",
              "        run: chmod +x gradlew",
              "",
              "      - name: Build",
              "        run: ./gradlew clean build --stacktrace",
              "",
              "      - name: Upload compiled JAR",
              "        if: success()",
              "        uses: actions/upload-artifact@v4",
              "        with:",
              "          name: scp-additions-" + "$" + "{{ github.sha }}",
              "          path: build/libs/*.jar",
              "          if-no-files-found: error",
          ]
          Path(".github/workflows/build.yml").write_text("\n".join(workflow_lines) + "\n", encoding="utf-8")
          PY
          python3 /tmp/fix_changelog.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md .github/workflows/build.yml
          git commit -m "Polish SCP Additions 3.0.7 changelog"
          git push origin HEAD:feature/cleanup-unused-assets

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Upload compiled JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
