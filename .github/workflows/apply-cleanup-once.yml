name: Apply Audited Cleanup Once

on:
  push:
    branches:
      - feature/cleanup-unused-assets
    paths:
      - .github/workflows/apply-cleanup-once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: feature/cleanup-unused-assets
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build audit baseline
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace
          python3 scripts/audit_unused_assets.py

      - name: Apply reviewed cleanup passes
        run: |
          python3 scripts/apply_cleanup_once.py
          python3 scripts/apply_cleanup_pass2_once.py
          python3 scripts/apply_cleanup_pass3_once.py

      - name: Validate JSON resources
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          skipped = {'.git', '.gradle', '.idea', 'build', 'run'}
          failures = []
          for path in Path('.').rglob('*.json'):
              if any(part in skipped for part in path.parts):
                  continue
              try:
                  json.loads(path.read_text(encoding='utf-8'))
              except Exception as exception:
                  failures.append(f'{path}: {exception}')
          if failures:
              raise SystemExit('\n'.join(failures))
          print('All source JSON files parsed successfully.')
          PY

      - name: Build cleaned mod
        run: ./gradlew clean build --stacktrace

      - name: Validate cleanup invariants
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          source = Path('src/main/java/net/mcreator/scpadditions/init/ScpAdditionsModItems.java').read_text(encoding='utf-8')
          old_block = source[source.find('CUP_OF_ALCOHOL'):source.find('private static RegistryObject<Item> block')]
          if 'REGISTRY.register' in old_block:
              raise SystemExit('Legacy SCP-294 item registrations remain.')

          if Path('src/main/resources/assets/scp_additions/sounds/enter.ogg').exists():
              raise SystemExit('Disabled enter.ogg still exists.')

          mapping = Path('src/main/java/net/mcreator/scpadditions/item/LegacyDrinkItemMappings.java')
          if not mapping.exists():
              raise SystemExit('Legacy drink world migration is missing.')

          print('Cleanup invariants passed.')
          PY
          git diff --check

      - name: Commit cleaned source
        run: |
          rm -f cleanup_manifest.json
          git rm scripts/apply_cleanup_once.py
          git rm scripts/apply_cleanup_pass2_once.py
          git rm scripts/apply_cleanup_pass3_once.py
          git rm .github/workflows/apply-cleanup-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove unused legacy content and duplicate assets"
          git push origin HEAD:feature/cleanup-unused-assets
