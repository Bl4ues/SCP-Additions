name: Asset Audit

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Audit repository and compiled JAR
        run: |
          python3 scripts/audit_unused_assets.py
          git rev-parse HEAD > build/reports/asset-audit/head-sha.txt
          git rev-parse 'HEAD^{tree}' > build/reports/asset-audit/tree-sha.txt

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: asset-audit-${{ github.sha }}
          path: build/reports/asset-audit
          if-no-files-found: error
