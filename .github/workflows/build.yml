name: Build

on:
  push:
    branches:
      - master
      - integration/scp-additions-3.0
  pull_request:
    branches:
      - master
      - integration/scp-additions-3.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply 3.0.1 correction set
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        run: |
          set +e
          python3 scripts/apply_3_0_1_audio_inventory_decon_fix.py > correction-apply.log 2>&1
          status=$?
          cat correction-apply.log
          exit $status

      - name: Apply decontamination compile correction
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        run: python3 scripts/fix_decon_sound_compile.py

      - name: Upload correction diagnostics
        if: failure() && github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        uses: actions/upload-artifact@v4
        with:
          name: correction-apply-diagnostics
          path: correction-apply.log

      - name: Validate 3.0.1 correction set
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          sounds = json.loads(Path('src/main/resources/assets/scp_additions/sounds.json').read_text())
          expected = {
              'enter': 9.0, 'scp902': 1.0, 'terminalloop': 2.25,
              'turningon': 9.0, 'turningoff': 9.0, 'overrideon': 9.0,
              'scp914refining': 2.25, 'overcharge': 2.0,
              'decontamination': 1.5, 'stone_scrap': 0.75,
              'eye_pod_idle': 3.0, 'eye_pod_move': 3.0,
          }
          for key, value in expected.items():
              assert {entry.get('volume') for entry in sounds[key]['sounds']} == {value}, key
          for key in ('dooropen', 'doorclosing', 'scp914dooropen', 'scp914doorclose',
                      'unity_door_opening', 'unity_door_closing', 'unity_door_open',
                      'unity_door_close', 'unity_bath_open', 'unity_bath_close',
                      'unity_office_open', 'unity_office_close'):
              assert {entry.get('volume') for entry in sounds[key]['sounds']} == {2.25}, key
          terminal = Path('src/main/java/net/mcreator/scpadditions/client/gui/TeslaTerminalScreen.java').read_text()
          message = Path('src/main/java/net/mcreator/scpadditions/network/TeslaTerminalButtonMessage.java').read_text()
          router = Path('src/main/java/com/bl4ues/scpinventory/item/ScpPickupRouter.java').read_text()
          maintenance = Path('src/main/java/com/bl4ues/scpinventory/event/ScpInventoryMaintenanceEvents.java').read_text()
          decon = Path('src/main/java/net/mcreator/scpadditions/procedures/DecontaminationCheckpointController.java').read_text()
          assert 'TeslaTerminalController.hasSecurityCredentials(entity)' in terminal
          assert 'buttonID != 2 && !TeslaTerminalController.hasSecurityCredentials(entity)' in message
          assert 'removeCustomCoins(inventory, customCoins - mirrorCoins)' not in router
          assert maintenance.index('reconcileWeaponHand(player, inventory)') < maintenance.index('collectConfiguredVanillaItems(player, inventory')
          assert 'chamber.contains(player.getBoundingBox().getCenter())' in decon
          assert 'emitFixedNozzleParticles' in decon
          assert 'BlockPos.containing(chamberCenter' in decon
          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          print('3.0.1 correction validation passed')
          PY

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: |
          set +e
          ./gradlew clean build --stacktrace > correction-build.log 2>&1
          status=$?
          tail -n 250 correction-build.log
          exit $status

      - name: Upload build diagnostics
        if: failure() && github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        uses: actions/upload-artifact@v4
        with:
          name: correction-build-diagnostics
          path: correction-build.log

      - name: Commit verified 3.0.1 correction
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/3.0.1-audio-inventory-decon'
        run: |
          git fetch origin master
          git checkout origin/master -- .github/workflows/build.yml
          rm -f scripts/apply_3_0_1_audio_inventory_decon_fix.py
          rm -f scripts/fix_decon_sound_compile.py
          rm -f .github/workflows/apply-3.0.1-audio-inventory-decon.yml
          rm -f docs/.validation-trigger*
          rm -f correction-apply.log correction-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Fix 3.0.1 audio inventory and decontamination behavior"
          git push origin HEAD:fix/3.0.1-audio-inventory-decon
