name: One-time final configuration polish

on:
  push:
    branches:
      - master
    paths:
      - tools/one_time_final_config_polish_v5.marker

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply, build, and report
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          : > /tmp/final-polish.log

          python tools/one_time_final_config_polish.py >> /tmp/final-polish.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python tools/one_time_final_config_polish_v4.py >> /tmp/final-polish.log 2>&1
            status=$?
          fi
          if [ "$status" -eq 0 ]; then
            ./gradlew clean build --stacktrace >> /tmp/final-polish.log 2>&1
            status=$?
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            git restore .github/workflows/one-time-final-config-polish.yml 2>/dev/null || true
            git restore tools/one_time_final_config_polish.py 2>/dev/null || true
            git restore tools/one_time_final_config_polish_v2.py 2>/dev/null || true
            git restore tools/one_time_final_config_polish_v3.py 2>/dev/null || true
            git restore tools/one_time_final_config_polish_v4.py 2>/dev/null || true
            cp /tmp/final-polish.log tools/final_polish_failure.log
            git add tools/final_polish_failure.log
            git commit -m "chore: record final polish failure"
            git push origin HEAD:master
            exit "$status"
          fi

          rm -f tools/one_time_final_config_polish_v5.marker
          git add -A
          git commit -m "feat(config): finish codex assets and recipe previews"
          git push origin HEAD:master
