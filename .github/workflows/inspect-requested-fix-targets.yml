name: Inspect requested fix targets

on:
  push:
    branches:
      - integration/scp-additions-3.0
    paths:
      - scripts/inspect_requested_fix_targets.py
      - .github/workflows/inspect-requested-fix-targets.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: integration/scp-additions-3.0

      - name: Inspect source
        run: python3 scripts/inspect_requested_fix_targets.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add migration-reference/requested-fix-targets.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Record requested fix source targets"
          git push origin HEAD:integration/scp-additions-3.0
