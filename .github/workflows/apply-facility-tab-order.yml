name: Apply facility tab order

on:
  pull_request:
    branches:
      - integration/scp-additions-3.0
    paths:
      - tools/apply_facility_tab_order.py
      - .github/workflows/apply-facility-tab-order.yml

permissions:
  contents: write

jobs:
  apply-build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply ordering patch
        run: python3 tools/apply_facility_tab_order.py

      - name: Remove temporary patch machinery
        run: |
          rm tools/apply_facility_tab_order.py
          rm .github/workflows/apply-facility-tab-order.yml

      - name: Validate and build
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('src/main/resources').rglob('*.json'):
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
          PY
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Commit verified ordering
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Curate facility tab order and remove bench"
            git push origin HEAD:${{ github.head_ref }}
          fi
