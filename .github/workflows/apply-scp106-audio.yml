          cat > src/main/java/net/mcreator/scpadditions/network/Scp106ChaseMusicPacket.java <<'EOF'
          package net.mcreator.scpadditions.network;

          import net.minecraft.network.FriendlyByteBuf;
          import net.minecraftforge.network.NetworkEvent;

          import java.util.UUID;
          import java.util.function.Supplier;

          /** Controls the local, non-positional SCP-106 chase soundtrack. */
          public final class Scp106ChaseMusicPacket {
              private final UUID sourceId;
              private final boolean active;

              public Scp106ChaseMusicPacket(UUID sourceId, boolean active) {
                  this.sourceId = sourceId;
                  this.active = active;
              }

              public static void encode(Scp106ChaseMusicPacket message,
                      FriendlyByteBuf buffer) {
                  buffer.writeUUID(message.sourceId);
                  buffer.writeBoolean(message.active);
              }

              public static Scp106ChaseMusicPacket decode(FriendlyByteBuf buffer) {
                  return new Scp106ChaseMusicPacket(buffer.readUUID(),
                          buffer.readBoolean());
              }

              public static void handle(Scp106ChaseMusicPacket message,
                      Supplier<NetworkEvent.Context> supplier) {
                  NetworkEvent.Context context = supplier.get();
                  context.enqueueWork(() ->
                          ClientPacketExecutor.setScp106ChaseMusic(
                                  message.sourceId, message.active));
                  context.setPacketHandled(true);
              }
          }
          EOF

          cat > src/main/java/net/mcreator/scpadditions/roamer/Scp106Audio.java <<'EOF'
          package net.mcreator.scpadditions.roamer;

          import net.minecraft.server.level.ServerLevel;
          import net.minecraft.sounds.SoundSource;
          import net.minecraft.world.phys.Vec3;
          import net.mcreator.scpadditions.init.ScpAdditionsModSounds;

          /** Shared positional audio helpers for SCP-106 world actions. */
          public final class Scp106Audio {
              private Scp106Audio() {
              }

              public static void playPhase(ServerLevel level, Vec3 position,
                      float volume) {
                  if (level == null || position == null || volume <= 0.0F) return;
                  float pitch = 0.94F + level.getRandom().nextFloat() * 0.12F;
                  level.playSound(null, position.x, position.y, position.z,
                          ScpAdditionsModSounds.SCP_106_PHASE.get(),
                          SoundSource.HOSTILE, volume, pitch);
              }
          }
          EOF

