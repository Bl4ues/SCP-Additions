name: Temporary Debug Build Log

on:
  push:
    branches:
      - fix/scp079-debug-and-power-balance
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  debug-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Capture build output
        shell: bash
        run: |
          set +e
          ./gradlew build --stacktrace > debug-build.log 2>&1
          status=$?
          echo "$status" > debug-build.status
          tail -n 250 debug-build.log
          exit 0
      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scp079-debug-build-log
          path: |
            debug-build.log
            debug-build.status
          if-no-files-found: error
