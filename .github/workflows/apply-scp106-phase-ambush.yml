          # White RGB allows the particle tint to remain visible; alpha carries
          # the irregular organic silhouette and soft edge.
          size = 32
          rng = random.Random(106)
          pixels = bytearray()
          harmonics = [(rng.uniform(0, math.tau), rng.uniform(0.035, 0.085), n)
                       for n in (2, 3, 5, 7)]
          for y in range(size):
              for x in range(size):
                  nx = (x + 0.5 - size / 2) / (size / 2)
                  ny = (y + 0.5 - size / 2) / (size / 2)
                  angle = math.atan2(ny, nx)
                  radius = math.sqrt(nx * nx + ny * ny)
                  boundary = 0.78
                  for phase, amplitude, frequency in harmonics:
                      boundary += math.sin(angle * frequency + phase) * amplitude
                  boundary += 0.055 * math.sin(angle * 11.0 + 0.8)
                  edge = boundary - radius
                  alpha = max(0.0, min(1.0, (edge + 0.09) / 0.18))
                  alpha = alpha * alpha * (3.0 - 2.0 * alpha)
                  pixels.extend((255, 255, 255, round(alpha * 255)))

          def png_chunk(kind, data):
              return (struct.pack('>I', len(data)) + kind + data
                      + struct.pack('>I', zlib.crc32(kind + data) & 0xffffffff))

          raw = bytearray()
          stride = size * 4
          for row in range(size):
              raw.append(0)
              raw.extend(pixels[row * stride:(row + 1) * stride])
          png = (b'\x89PNG\r\n\x1a\n'
                 + png_chunk(b'IHDR', struct.pack('>IIBBBBB',
                     size, size, 8, 6, 0, 0, 0))
                 + png_chunk(b'IDAT', zlib.compress(bytes(raw), 9))
                 + png_chunk(b'IEND', b''))
          texture_path = Path('src/main/resources/assets/scp_additions/textures/particle/scp_106_puddle.png')
          texture_path.parent.mkdir(parents=True, exist_ok=True)
          texture_path.write_bytes(png)
          PY

