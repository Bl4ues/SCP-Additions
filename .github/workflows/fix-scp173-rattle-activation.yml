name: Fix SCP-173 rattle and activation

on:
  push:
    branches:
      - fix/3.0.1-rattle-activation
    paths:
      - scripts/fix_scp173_spawn_activation.py
      - .github/workflows/fix-scp173-rattle-activation.yml

permissions:
  contents: write

jobs:
  apply-and-release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/3.0.1-rattle-activation
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply SCP-173 correction
        run: python3 scripts/fix_scp173_spawn_activation.py

      - name: Validate intended behavior
        run: |
          python3 - <<'PY'
          from pathlib import Path

          spawn = Path('src/main/java/net/mcreator/scpadditions/event/Scp173SpawnEvents.java').read_text()
          entity = Path('src/main/java/net/mcreator/scpadditions/entity/Scp173Entity.java').read_text()
          changelog = Path('CHANGELOG.md').read_text()

          assert 'Scp173Sounds.RATTLE.get()' in spawn
          assert 'spawn173(level, pos, player, random)' in spawn
          assert 'setNoAi(true);' in entity
          assert 'Player observer = findObservingPlayer();' in entity
          assert 'setNoAi(false);' in entity
          assert 'LivingEntity observer = findObservingEntity();' not in entity[entity.index('if (!isActivated())'):entity.index('LivingEntity observer = findObservingEntity();', entity.index('if (!isActivated())') + 1)]
          assert 'Restored the intended rattle sound' in changelog
          assert 'producing dragging sounds before' in changelog
          print('Behavior validation passed')
          PY

      - name: Build correction
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Remove temporary executor
        run: |
          rm -f scripts/fix_scp173_spawn_activation.py
          rm -f .github/workflows/fix-scp173-rattle-activation.yml

      - name: Commit verified correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct SCP-173 natural spawn activation"

      - name: Promote correction to master
        run: git push origin HEAD:master

      - name: Remove temporary branch
        run: git push origin --delete fix/3.0.1-rattle-activation

# Triggered after review of the intended natural-spawn behavior.
