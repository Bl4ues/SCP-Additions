name: Index current inventory prototype

on:
  push:
    branches:
      - integration/scp-additions-3.0

permissions:
  contents: write

jobs:
  index:
    if: contains(github.event.head_commit.message, 'index current prototype files')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate prototype index
        run: |
          find src/main/java/net/mcreator/scpadditions/inventory -type f 2>/dev/null \
            | sort > migration-reference/current-additions-inventory-files.txt || true
      - name: Commit index
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add migration-reference/current-additions-inventory-files.txt
          git commit -m "chore(inventory): index current Additions prototype"
          git push origin HEAD:integration/scp-additions-3.0
