name: One-time final configuration polish

on:
  push:
    branches:
      - master
    paths:
      - tools/one_time_final_config_polish.py

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Apply final polish
        run: python tools/one_time_final_config_polish.py

      - name: Build
        run: ./gradlew clean build --stacktrace

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(config): finish codex assets and recipe previews"
          git push origin HEAD:master
