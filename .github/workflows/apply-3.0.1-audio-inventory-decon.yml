name: Apply 3.0.1 audio inventory decon fixes

on:
  push:
    branches:
      - fix/3.0.1-audio-inventory-decon
    paths:
      - scripts/apply_3_0_1_audio_inventory_decon_fix.py
      - .github/workflows/apply-3.0.1-audio-inventory-decon.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/3.0.1-audio-inventory-decon
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply correction set
        run: python3 scripts/apply_3_0_1_audio_inventory_decon_fix.py

      - name: Validate corrected behavior and resources
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          sounds = json.loads(Path('src/main/resources/assets/scp_additions/sounds.json').read_text())
          def volume(key):
              return {entry.get('volume') for entry in sounds[key]['sounds']}

          expected = {
              'enter': {9.0},
              'scp902': {1.0},
              'terminalloop': {2.25},
              'turningon': {9.0},
              'turningoff': {9.0},
              'overrideon': {9.0},
              'scp914refining': {2.25},
              'overcharge': {2.0},
              'decontamination': {1.5},
              'stone_scrap': {0.75},
              'eye_pod_idle': {3.0},
              'eye_pod_move': {3.0},
          }
          for key, wanted in expected.items():
              assert volume(key) == wanted, (key, volume(key), wanted)

          for key in ('dooropen', 'doorclosing', 'scp914dooropen', 'scp914doorclose',
                      'unity_door_opening', 'unity_door_closing', 'unity_door_open',
                      'unity_door_close', 'unity_bath_open', 'unity_bath_close',
                      'unity_office_open', 'unity_office_close'):
              assert volume(key) == {2.25}, (key, volume(key))

          terminal = Path('src/main/java/net/mcreator/scpadditions/client/gui/TeslaTerminalScreen.java').read_text()
          server_terminal = Path('src/main/java/net/mcreator/scpadditions/network/TeslaTerminalButtonMessage.java').read_text()
          router = Path('src/main/java/com/bl4ues/scpinventory/item/ScpPickupRouter.java').read_text()
          maintenance = Path('src/main/java/com/bl4ues/scpinventory/event/ScpInventoryMaintenanceEvents.java').read_text()
          decon = Path('src/main/java/net/mcreator/scpadditions/procedures/DecontaminationCheckpointController.java').read_text()
          reload_block = Path('src/main/java/net/mcreator/scpadditions/block/DeconOpenReloadBlock.java').read_text()

          assert 'TeslaTerminalController.hasSecurityCredentials(entity)' in terminal
          assert 'buttonID != 2 && !TeslaTerminalController.hasSecurityCredentials(entity)' in server_terminal
          assert 'removeCustomCoins(inventory, customCoins - mirrorCoins)' not in router
          assert 'Legacy vanilla mirror stacks are cleanup data only' in router
          assert maintenance.index('reconcileWeaponHand(player, inventory)') < maintenance.index('collectConfiguredVanillaItems(player, inventory')
          assert 'chamber.contains(player.getBoundingBox().getCenter())' in decon
          assert 'emitFixedNozzleParticles' in decon
          assert 'LATCHED_UNTIL_EXIT' in decon and 'PROCESSING' in decon
          assert 'world.scheduleTick(pos, this, 20)' not in reload_block

          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          print('Behavior and JSON validation passed')
          PY

      - name: Build corrected mod
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Remove temporary executor
        run: |
          rm -f scripts/apply_3_0_1_audio_inventory_decon_fix.py
          rm -f .github/workflows/apply-3.0.1-audio-inventory-decon.yml
          rm -f docs/.validation-trigger*

      - name: Commit verified correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Fix 3.0.1 audio inventory and decontamination behavior"
          git push origin HEAD:fix/3.0.1-audio-inventory-decon
