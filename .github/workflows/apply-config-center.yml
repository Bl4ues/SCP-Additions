name: Apply Config Center

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rollout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Expand reviewed configuration-center sources
        shell: bash
        run: cat .github/config-center-payload/part*.b64 | base64 --decode | tar -xz

      - name: Apply Screen helper naming fix
        shell: bash
        run: sed -i 's/rebuildWidgets()/refreshRows()/g' src/main/java/net/mcreator/scpadditions/config/ui/ConfigCenterClient.java

      - name: Check patch formatting
        run: git diff --check

      - name: Build
        id: build
        shell: bash
        run: |
          set +e
          ./gradlew clean build --stacktrace 2>&1 | tee /tmp/config-center-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish concise build diagnostics
        if: steps.build.outputs.status != '0'
        shell: bash
        run: |
          {
            echo "Configuration Center build diagnostics"
            echo
            grep -nE "(^| )error:|cannot find symbol|symbol:|location:|FAILURE:|What went wrong:|Execution failed" /tmp/config-center-build.log | tail -n 400
          } > .github/config-center-build-errors.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/config-center-build-errors.txt
          git commit -m "chore: capture config center build diagnostics" || true
          git push origin HEAD:${{ github.head_ref }}
          exit 1

      - name: Commit compiled implementation to rollout branch
        if: steps.build.outputs.status == '0'
        shell: bash
        run: |
          rm -rf .github/config-center-payload .github/workflows/apply-config-center.yml .github/config-center-build-errors.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(config): add native in-game configuration center"
          git push origin HEAD:${{ github.head_ref }}
