name: Fabric 1.21.1 Port

on:
  push:
    branches:
      - fabric-1.21.1-port-3.0.7
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Fabric branch
        uses: actions/checkout@v4
        with:
          ref: fabric-1.21.1-port-3.0.7
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Materialize shared Minecraft 1.21.1 frontier
        shell: bash
        env:
          NEOFORGE_FRONTIER: 3ae02e88d6d429fad12f6d4d65582e2af83f2f7b
        run: |
          set -euo pipefail
          temp_root="$(mktemp -d)"
          neo_dir="$temp_root/neoforge"
          git fetch origin "$NEOFORGE_FRONTIER"
          git worktree add --detach "$neo_dir" "$NEOFORGE_FRONTIER"

          scripts=(
            apply_tick_bridge.py
            apply_network_bridge.py
            apply_inventory_attachment.py
            apply_player_variables_attachment.py
            apply_saved_data_api.py
            apply_inventory_stack_serialization.py
            apply_misc_api_moves.py
            apply_item_custom_data.py
            apply_item_api_renames.py
            apply_core_api_moves.py
            apply_capability_and_ui_api.py
            apply_gameplay_api_round2.py
            apply_gameplay_api_round3.py
            apply_gameplay_api_round4.py
            apply_gameplay_api_round5.py
            apply_gameplay_api_round6.py
          )
          : > fabric-migration.log
          for script in "${scripts[@]}"; do
            echo "=== $script ===" | tee -a fabric-migration.log
            (cd "$neo_dir" && python3 "tools/neoforge_port/$script") \
              2>&1 | tee -a fabric-migration.log
          done

          cp src/main/resources/fabric.mod.json "$temp_root/fabric.mod.json"
          cp src/main/resources/scp_additions.accesswidener "$temp_root/scp_additions.accesswidener"

          rm -rf src/main/java src/main/resources config
          mkdir -p src/main
          cp -a "$neo_dir/src/main/java" src/main/java
          cp -a "$neo_dir/src/main/resources" src/main/resources
          if test -d "$neo_dir/config"; then
            cp -a "$neo_dir/config" config
          fi

          cp "$temp_root/fabric.mod.json" src/main/resources/fabric.mod.json
          cp "$temp_root/scp_additions.accesswidener" src/main/resources/scp_additions.accesswidener
          rm -f src/main/resources/META-INF/mods.toml
          rm -f src/main/resources/META-INF/neoforge.mods.toml
          rm -f src/main/resources/META-INF/accesstransformer.cfg

          python3 tools/fabric_port/apply_fabric_bridge.py \
            2>&1 | tee -a fabric-migration.log
          git diff --binary > fabric-transformed.patch
          git worktree remove --force "$neo_dir"

      - name: Commit materialized Fabric source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java src/main/resources config fabric-migration.log
          if git diff --cached --quiet; then
            echo 'Fabric source frontier is already materialized.'
          else
            git commit -m 'Materialize Fabric 1.21.1 source frontier [skip ci]'
            git push origin HEAD:fabric-1.21.1-port-3.0.7
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Fabric port and preserve frontier
        shell: bash
        run: |
          set +e
          ./gradlew clean build --no-daemon --stacktrace > fabric-build.log 2>&1
          status=$?
          echo "$status" > fabric-build.exitcode
          grep -E "^.*error:|FAILURE:|What went wrong|BUILD (SUCCESSFUL|FAILED)" \
            fabric-build.log | head -n 3500 > fabric-build-errors.log || true
          tail -n 800 fabric-build.log
          exit 0

      - name: Export transformed Fabric worktree
        if: always()
        shell: bash
        run: |
          zip -qr fabric-transformed-source.zip . \
            -x '.git/*' 'build/*' '.gradle/*' 'run/*' '*.zip'

      - name: Upload Fabric build frontier
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabric-build-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            fabric-migration.log
            fabric-build.log
            fabric-build-errors.log
            fabric-build.exitcode
            fabric-transformed.patch
            fabric-transformed-source.zip
            build/libs/*.jar
            build/reports/**
          if-no-files-found: warn

      - name: Verify Fabric build result
        shell: bash
        run: test "$(cat fabric-build.exitcode)" = "0"

      - name: Upload compiled Fabric JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-fabric-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Launch Fabric dedicated server smoke test
        if: success()
        shell: bash
        run: |
          set +e
          mkdir -p run/server
          printf 'eula=true\n' > run/server/eula.txt
          cat > run/server/server.properties <<'EOF'
          online-mode=false
          server-port=25577
          motd=SCP Additions Fabric smoke test
          view-distance=4
          simulation-distance=4
          spawn-protection=0
          max-tick-time=120000
          EOF
          : > fabric-server-console.log
          setsid ./gradlew runServer --no-daemon --console=plain \
            > fabric-server-console.log 2>&1 &
          launcher_pid=$!
          started=0
          for second in $(seq 1 300); do
            if test -f run/server/logs/latest.log \
                && grep -Fq 'Done (' run/server/logs/latest.log; then
              started=1
              echo "Dedicated server reached ready state after ${second}s."
              break
            fi
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -INT -- "-$launcher_pid" 2>/dev/null || true
            sleep 5
          fi
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -KILL -- "-$launcher_pid" 2>/dev/null || true
          fi
          wait "$launcher_pid" 2>/dev/null || true
          test -f run/server/logs/latest.log \
            && cp run/server/logs/latest.log fabric-server-latest.log
          if test "$started" != "1"; then
            echo 'Dedicated server did not reach the ready state.'
            tail -n 500 fabric-server-console.log
            exit 1
          fi
          if grep -Eqi 'Exception in server tick loop|Failed to start the minecraft server|Mod resolution encountered an incompatible mod set|Could not execute entrypoint' \
              fabric-server-console.log fabric-server-latest.log 2>/dev/null; then
            echo 'Dedicated server log contains a fatal startup error.'
            tail -n 500 fabric-server-console.log
            exit 1
          fi

      - name: Upload Fabric server smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fabric-server-smoke-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            fabric-server-console.log
            fabric-server-latest.log
            run/server/crash-reports/**
          if-no-files-found: warn
