name: Temporary Decontamination Collision Patch

on:
  push:
    branches:
      - fix/decontamination-collision-breaks

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/decontamination-collision-breaks
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Apply controller safeguards
        run: python tools/temporary_decon_collision_patch.py
      - name: Compile Java
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew compileJava --stacktrace
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/java
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Guard decontamination transitions while mining"
          git push origin HEAD:fix/decontamination-collision-breaks
