name: Update 3.0.3 documentation once

on:
  push:
    branches:
      - master
    paths:
      - scripts/update_303_docs.py
      - .github/workflows/update-303-docs-once.yml

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Patch documentation
        run: python scripts/update_303_docs.py

      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: update 3.0.3 configuration references"
          git push origin HEAD:master
