name: NeoForge compile frontier

on:
  push:
    branches:
      - neoforge-1.21.1-port-3.0.7

permissions:
  contents: write

jobs:
  compile:
    if: contains(github.event.head_commit.message, '[neoforge-compile-frontier]')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: neoforge-1.21.1-port-3.0.7
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Compile current migrated tree
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          ./gradlew clean compileJava --no-daemon --stacktrace > neoforge-compile.log 2>&1
          status=$?
          echo "$status" > neoforge-compile.exitcode
          grep -E "^.*error:|FAILURE:|What went wrong|BUILD (SUCCESSFUL|FAILED)" neoforge-compile.log | head -n 600 > neoforge-compile-errors.log || true
          tail -n 300 neoforge-compile.log
          exit 0

      - name: Commit compiler frontier
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add neoforge-compile.log neoforge-compile-errors.log neoforge-compile.exitcode
          git commit -m "Record NeoForge 1.21.1 compiler frontier" || true
          git pull --rebase origin neoforge-1.21.1-port-3.0.7
          git push origin HEAD:neoforge-1.21.1-port-3.0.7
