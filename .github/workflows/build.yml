name: Build

on:
  push:
    branches:
      - fabric-1.21.1-port-3.0.7
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout Fabric source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Fabric port
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Upload compiled Fabric JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: scp-additions-fabric-${{ github.event.pull_request.head.sha || github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
