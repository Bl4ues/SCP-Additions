name: SCP-106 Branch Maintenance

on:
  push:
    branches:
      - feature/scp106-roamer-encounter

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/scp106-roamer-encounter

      - name: Merge current master and finalize branch files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master

          set +e
          git merge --no-commit --no-ff origin/master
          merge_status=$?
          set -e

          if git diff --name-only --diff-filter=U | grep -q '^src/main/java/net/mcreator/scpadditions/vitals/client/ScpSpawnTimersOverlay.java$'; then
            git checkout --theirs -- src/main/java/net/mcreator/scpadditions/vitals/client/ScpSpawnTimersOverlay.java
            python - <<'PY'
          from pathlib import Path
          path = Path('src/main/java/net/mcreator/scpadditions/vitals/client/ScpSpawnTimersOverlay.java')
          text = path.read_text()
          marker = '            case CHANCE_FAILED -> "LAST CHECK: CHANCE FAILED";\n'
          addition = marker + ('            case CHANCE_FAILED_OTHER_ROAMER ->\n'
                               '                    "LAST CHECK: OTHER ROAMER REDUCED CHANCE";\n')
          if 'CHANCE_FAILED_OTHER_ROAMER' not in text:
              if marker not in text:
                  raise SystemExit('Could not locate roamer result switch insertion point')
              text = text.replace(marker, addition, 1)
          path.write_text(text)
          PY
            git add src/main/java/net/mcreator/scpadditions/vitals/client/ScpSpawnTimersOverlay.java
          fi

          unresolved=$(git diff --name-only --diff-filter=U)
          if [ -n "$unresolved" ]; then
            echo "Unresolved files after master synchronization:"
            echo "$unresolved"
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path

          entity = Path('src/main/java/net/mcreator/scpadditions/entity/Scp106Entity.java')
          text = entity.read_text()
          old = '            ServerPlayer hunted = serverLevel.getPlayerByUUID(huntedPlayerId);'
          new = '            Player hunted = serverLevel.getPlayerByUUID(huntedPlayerId);'
          if old in text:
              text = text.replace(old, new, 1)
          entity.write_text(text)

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          start = text.index('## SCP-106\n')
          end = text.index('## SCP-173\n', start)
          scp106 = '''## SCP-106

- Added the SCP-106 entity, including its model, texture, animations, black-and-brown spawn egg, **The Old Man** tooltip, and placement in the SCPs creative tab;
- Added direct player pursuit, close-contact melee attacks dealing 5 damage and five seconds of particle-free Wither, subtle head tracking, and a grotesque near-black and dark-brown Wither Health Bar;
- Added sparse, irregular black-brown corrosion pools while SCP-106 walks;
- Added a natural roamer cycle with its first check two minutes after a Survival player enters the world, followed by the same five-minute recurring interval and 1-in-3 base chance used by SCP-173;
- Added floor and wall emergence using dedicated animations and large corrosive portal pools before SCP-106 begins an immediate pursuit;
- Added organic hunt interest lasting from short encounters below 30 seconds to pursuits of up to three minutes, with successful attacks capable of briefly extending the hunt;
- Added solid-matter phasing with in-wall suffocation immunity, 50% phase movement speed, collision bypass only while entering or occupying solid blocks, and normal gravity across open gaps;
- Added distance-pressure ambushes that make SCP-106 sink away and re-emerge ahead of a fleeing target near the target's current height;
- Integrated SCP-106 with the shared roamer debug HUD, gamerule controls, containment state, and despawn commands.

'''
          text = text[:start] + scp106 + text[end:]

          old_roamer = ('- Added persistent world gamerules `173spawn` and `106spawn` for individual roamer spawn control; '
                         'SCP-106 remains reported as disabled until its natural spawn scheduler is implemented;')
          new_roamer = ('- Added persistent world gamerules `173spawn` and `106spawn` for individual roamer spawn control, '
                         'with both natural spawn schedulers now implemented;')
          if old_roamer in text:
              text = text.replace(old_roamer, new_roamer, 1)

          anchor = ('- Stopped spawn countdowns while any matching roamer instance is active and made a full interval begin only after '
                    'the final active instance despawns naturally, dies, or is removed by command;\n')
          extra = (anchor
                   + '- Offset SCP-106\'s initial two-minute check from SCP-173 while keeping both roamers on five-minute recurring checks afterward;\n'
                   + '- Reduced either roamer\'s spawn chance from 1-in-3 to 1-in-9 while the other is active, preserving rare but survivable double-encounter possibilities and reporting the penalty in the debug HUD;\n')
          if 'Reduced either roamer\'s spawn chance from 1-in-3 to 1-in-9' not in text:
              if anchor not in text:
                  raise SystemExit('Could not locate roamer changelog insertion point')
              text = text.replace(anchor, extra, 1)
          changelog.write_text(text)
          PY

          git checkout origin/master -- .github/workflows/build.yml
          rm -f .github/workflows/scp106-branch-maintenance.yml
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Sync master and finalize SCP-106 encounter branch"
          git push origin HEAD:feature/scp106-roamer-encounter
