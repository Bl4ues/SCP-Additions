name: Materialize 3.0.7 Multiplayer Hotfix

on:
  push:
    branches:
      - feature/3.0.7-multiplayer-hotfix
    paths:
      - 'tools/hotfix/**'
      - '.github/workflows/materialize-multiplayer-hotfix.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tools/hotfix/**'
      - '.github/workflows/materialize-multiplayer-hotfix.yml'
      - 'src/main/**'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout hotfix revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Apply hotfix materializers
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/hotfix/apply_gameplay_hotfix_3_0_7.py | tee gameplay-hotfix.log
          python3 tools/hotfix/apply_multiplayer_config_hotfix_3_0_7.py | tee config-hotfix.log
          python3 tools/hotfix/apply_tool_session_hotfix_3_0_7.py | tee tool-hotfix.log
          git diff --check
          git diff --binary > multiplayer-hotfix.patch

      - name: Validate multiplayer regression surface
        run: python3 tools/hotfix/validate_multiplayer_hotfix_3_0_7.py

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Forge 1.20.1 hotfix
        run: ./gradlew clean build --no-daemon --stacktrace | tee forge-hotfix-build.log

      - name: Audit compiled assets
        run: python3 scripts/audit_unused_assets.py

      - name: Launch dedicated server smoke test
        shell: bash
        run: |
          set +e
          mkdir -p run
          printf 'eula=true\n' > run/eula.txt
          cat > run/server.properties <<'EOF'
          online-mode=false
          server-port=25579
          motd=SCP Additions 3.0.7 multiplayer hotfix smoke test
          view-distance=4
          simulation-distance=4
          spawn-protection=0
          max-tick-time=120000
          EOF
          : > forge-hotfix-server-console.log
          setsid ./gradlew runServer --no-daemon --console=plain > forge-hotfix-server-console.log 2>&1 &
          launcher_pid=$!
          started=0
          for second in $(seq 1 240); do
            if test -f run/logs/latest.log && grep -Fq 'Done (' run/logs/latest.log; then
              started=1
              echo "Dedicated server reached ready state after ${second}s."
              break
            fi
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -INT -- "-$launcher_pid" 2>/dev/null || true
            sleep 5
          fi
          if kill -0 "$launcher_pid" 2>/dev/null; then
            kill -KILL -- "-$launcher_pid" 2>/dev/null || true
          fi
          wait "$launcher_pid" 2>/dev/null || true
          test -f run/logs/latest.log && cp run/logs/latest.log forge-hotfix-server-latest.log
          if test "$started" != "1"; then
            echo 'Dedicated server did not reach ready state.'
            tail -n 500 forge-hotfix-server-console.log
            exit 1
          fi
          if grep -Eqi 'Exception in server tick loop|Failed to start the minecraft server|Mod loading has failed|Loading errors encountered' forge-hotfix-server-console.log forge-hotfix-server-latest.log 2>/dev/null; then
            echo 'Dedicated server log contains a fatal startup error.'
            tail -n 500 forge-hotfix-server-console.log
            exit 1
          fi

      - name: Launch graphical client smoke test
        shell: bash
        run: |
          set +e
          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xvfb
          fi
          : > forge-hotfix-client-console.log
          timeout --signal=INT --kill-after=20s 150s \
            xvfb-run -a -s '-screen 0 1280x720x24' \
            ./gradlew runClient --no-daemon --console=plain \
            > forge-hotfix-client-console.log 2>&1
          status=$?
          test -f run/logs/latest.log && cp run/logs/latest.log forge-hotfix-client-latest.log
          if test "$status" != "124" && test "$status" != "130"; then
            echo "Client exited before smoke window completed (status $status)."
            tail -n 500 forge-hotfix-client-console.log
            exit 1
          fi
          if ! grep -Eqi 'Sound engine started|OpenAL initialized|Created: [0-9]+x[0-9]+x[0-9]+ minecraft:textures/atlas' forge-hotfix-client-console.log forge-hotfix-client-latest.log 2>/dev/null; then
            echo 'Client did not reach rendered title-screen initialization.'
            tail -n 500 forge-hotfix-client-console.log
            exit 1
          fi
          if grep -Eqi 'Mod loading has failed|Loading errors encountered|Exception in thread "Render thread"|The game crashed whilst|Description: Initializing game' forge-hotfix-client-console.log forge-hotfix-client-latest.log 2>/dev/null; then
            echo 'Client log contains a fatal startup error.'
            tail -n 500 forge-hotfix-client-console.log
            exit 1
          fi

      - name: Commit validated hotfix source
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/main/java src/main/resources config
          if git diff --cached --quiet; then
            echo 'Hotfix source is already materialized.'
          else
            git commit -m 'Fix multiplayer config, usable tools, SCP-173, SCP-294 and Tesla Gates [skip ci]'
            git push origin HEAD:feature/3.0.7-multiplayer-hotfix
          fi

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multiplayer-hotfix-validation-${{ github.sha }}
          path: |
            gameplay-hotfix.log
            config-hotfix.log
            tool-hotfix.log
            multiplayer-hotfix.patch
            forge-hotfix-build.log
            forge-hotfix-server-console.log
            forge-hotfix-server-latest.log
            forge-hotfix-client-console.log
            forge-hotfix-client-latest.log
            build/libs/*.jar
            build/reports/**
            run/crash-reports/**
          if-no-files-found: warn
