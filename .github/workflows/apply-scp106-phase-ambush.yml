              '            AMBUSH_DISTANCE * AMBUSH_DISTANCE;\n'
              '    private static final double AMBUSH_HARD_DISTANCE = 26.0D;\n'
              '    private static final double AMBUSH_HARD_DISTANCE_SQR =\n'
              '            AMBUSH_HARD_DISTANCE * AMBUSH_HARD_DISTANCE;\n',
              'SCP-106 ambush distance constants')
          entity = replace_once(
              entity,
              '    private static final int AMBUSH_DISTANCE_TICKS = 20;\n',
              '    private static final int AMBUSH_DISTANCE_TICKS = 12;\n'
              '    private static final int AMBUSH_RETRY_TICKS = 8;\n',
